<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenador de Voleibol - Pantalla Principal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }
        /* Contenedor del área de juego */
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #333;
            background: linear-gradient(to bottom, #111 60%, #2c3e50 100%); /* Simula perspectiva */
            border-radius: 8px;
        }
        canvas {
            display: block;
        }
        /* Panel de conexión temporal */
        #connection-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
        }
        .status-disconnected { color: #ff4757; }
        .status-connected { color: #2ed573; }
    </style>
</head>
<body>

    <h1>Simulador de Recepción de Voleibol</h1>
    
    <div id="game-container">
        <div id="connection-panel">
            <p>Estado: <span id="status" class="status-disconnected">Esperando Teléfono...</span></p>
            <small>Abre "phone.html" en tu celular (Pronto vinculación por QR)</small>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Variables del balón (posición X, Y y Radio para simular cercanía)
        let ball = { x: 400, y: 150, radius: 10, speedY: 2, speedRadius: 0.3 };
        // Variables de las manos virtuales
        let hands = { x: 400, y: 500 };

        function draw() {
            // Limpiar pantalla
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Dibujar las manos del jugador
            ctx.beginPath();
            ctx.arc(hands.x, hands.y, 30, 0, Math.PI * 2);
            ctx.fillStyle = "#eccc68"; // Color simulando manos/antebrazos
            ctx.fill();
            ctx.closePath();

            // 2. Dibujar el Balón de Voleibol
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#333";
            ctx.stroke();
            ctx.closePath();

            // 3. Animación simple del balón viniendo hacia ti (aumenta de tamaño)
            ball.y += ball.speedY;
            ball.radius += ball.speedRadius;

            // Reiniciar balón si pasa la pantalla (bucle de práctica)
            if (ball.y > canvas.height + 50) {
                ball = { x: Math.random() * (600 - 200) + 200, y: 150, radius: 10, speedY: 2, speedRadius: 0.3 };
            }

            requestAnimationFrame(draw);
        }

        // Iniciar la animación
        draw();

        // ESCUCHA TEMPORAL: Para probar el movimiento con las flechas del teclado de la PC antes de conectar el teléfono
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') hands.x -= 20;
            if (e.key === 'ArrowRight') hands.x += 20;
        });
    </script>
</body>
</html>
