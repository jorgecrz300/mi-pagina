<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VolleyJS - Fixed Edition</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #ui {
            display: flex;
            gap: 40px;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: bold;
        }
        canvas {
            background: linear-gradient(#87CEEB, #B0E0E6);
            border: 4px solid #fff;
            border-bottom: 10px solid #5d4037;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .info {
            margin-top: 10px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>Jugador: <span id="p1-score">0</span></div>
        <div>IA: <span id="p2-score">0</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="info">Flechas para mover/saltar | <b>ESPACIO</b> para reiniciar el punto</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let p1Score = 0;
        let p2Score = 0;
        const gravity = 0.5;

        let player = { x: 100, y: 350, w: 30, h: 50, dy: 0, speed: 6, jumping: false, color: '#ff4444' };
        let enemy = { x: 670, y: 350, w: 30, h: 50, dy: 0, speed: 4, jumping: false, color: '#44ff44' };
        let ball = { x: 400, y: 100, radius: 10, dx: 3, dy: 0 };
        const net = { x: 395, y: 250, w: 10, h: 150 };

        function resetBall() {
            ball.x = 400;
            ball.y = 100;
            ball.dx = (Math.random() > 0.5 ? 3 : -3);
            ball.dy = 0;
        }

        // Función para evitar que el balón se quede pegado
        function checkCollision(p) {
            if (ball.x + ball.radius > p.x && 
                ball.x - ball.radius < p.x + p.w && 
                ball.y + ball.radius > p.y && 
                ball.y - ball.radius < p.y + p.h) {
                
                // Si golpea desde arriba, rebota fuerte
                ball.dy = -10;
                
                // Dirección horizontal basada en qué lado del jugador golpea
                let diff = ball.x - (p.x + p.w/2);
                ball.dx = diff * 0.5;

                // Empujar el balón fuera del jugador para que no se trabe
                ball.y = p.y - ball.radius - 1;
            }
        }

        function update() {
            // Jugador
            player.dy += gravity;
            player.y += player.dy;
            if (player.y > 350) {
                player.y = 350;
                player.dy = 0;
                player.jumping = false;
            }

            // IA
            enemy.dy += gravity;
            enemy.y += enemy.dy;
            if (enemy.y > 350) {
                enemy.y = 350;
                enemy.dy = 0;
                enemy.jumping = false;
            }

            // Lógica simple IA
            if (ball.x > 400) {
                if (enemy.x + enemy.w/2 < ball.x) enemy.x += enemy.speed;
                else enemy.x -= enemy.speed;
                if (ball.y < 250 && !enemy.jumping) {
                    enemy.dy = -10;
                    enemy.jumping = true;
                }
            }

            // Balón
            ball.dy += 0.25; // Gravedad balón
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Paredes
            if (ball.x < 0 || ball.x > canvas.width) ball.dx *= -1;

            // Suelo (Puntos)
            if (ball.y > canvas.height) {
                if (ball.x < 400) p2Score++; else p1Score++;
                document.getElementById('p1-score').innerText = p1Score;
                document.getElementById('p2-score').innerText = p2Score;
                resetBall();
            }

            // Colisión Red
            if (ball.x + ball.radius > net.x && ball.x - ball.radius < net.x + net.w && ball.y > net.y) {
                ball.dx *= -1;
                // Reposicionar para evitar bucle de colisión
                ball.x = (ball.x < 400) ? net.x - ball.radius : net.x + net.w + ball.radius;
            }

            checkCollision(player);
            checkCollision(enemy);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Red
            ctx.fillStyle = "white";
            ctx.fillRect(net.x, net.y, net.w, net.h);

            // Jugadores
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = enemy.color;
            ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);

            // Balón
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
            ctx.fillStyle = "yellow";
            ctx.fill();
            ctx.closePath();

            handleInput();
            update();
            requestAnimationFrame(draw);
        }

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            // Corregido el botón de espacio
            if (e.code === 'Space') {
                e.preventDefault(); // Evita que la página baje
                resetBall();
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function handleInput() {
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < net.x - player.w) player.x += player.speed;
            if (keys['ArrowUp'] && !player.jumping) {
                player.dy = -12;
                player.jumping = true;
            }
        }

        draw();
    </script>
</body>
</html>
