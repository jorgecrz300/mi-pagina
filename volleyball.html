<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenador de Voleibol - Servidor PC</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qr-creator/dist/qr-creator.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #1a1a1a; color: white; font-family: Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }
        #game-container {
            position: relative; width: 800px; height: 600px;
            border: 4px solid #333; background: linear-gradient(to bottom, #111 60%, #2c3e50 100%);
            border-radius: 8px;
        }
        canvas { display: block; }
        /* Pantalla de emparejamiento (QR) */
        #lobby {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        #qrcode { background: white; padding: 15px; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 10px;">Simulador de Recepción de Voleibol</h1>
    
    <div id="game-container">
        <div id="lobby">
            <h2>Escanea con tu teléfono para conectar</h2>
            <div id="qrcode"></div>
            <p style="margin-top: 15px; color: #aaa;" id="peer-id-text">Generando código de conexión...</p>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const lobby = document.getElementById('lobby');

        let ball = { x: 400, y: 150, radius: 10, speedY: 2, speedRadius: 0.3 };
        let hands = { x: 400, y: 500 };

        // --- CONEXIÓN CON PEERJS ---
        // Creamos una ID aleatoria para la computadora
        const peer = new Peer('voley-pc-' + Math.floor(Math.random() * 9999));

        peer.on('open', (id) => {
            document.getElementById('peer-id-text').innerText = "ID de sala: " + id;
            
            // Generamos la URL que debe abrir el teléfono. 
            // IMPORTANTE: Cuando lo subas a GitHub, cambiaremos esta URL local por la tuya de GitHub Pages.
            const urlParaCelular = window.location.href.replace('index.html', '') + 'phone.html?sala=' + id;
            
            // Dibujar el código QR
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            QrCreator.render({ text: urlParaCelular, radius: 0.5, size: 200 }, qrContainer);
        });

        // Esperar a que el teléfono se conecte
        peer.on('connection', (conn) => {
            lobby.style.display = 'none'; // Escondemos el QR porque ya se conectó
            
            // Escuchar los datos que envía el teléfono
            conn.on('data', (data) => {
                if (data.tipo === 'movimiento') {
                    // Modificamos la posición X de las manos según lo que mande el celular
                    hands.x = data.x;
                }
            });
        });

        // --- BUCLE DEL JUEGO ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Manos
            ctx.beginPath();
            ctx.arc(hands.x, hands.y, 35, 0, Math.PI * 2);
            ctx.fillStyle = "#eccc68";
            ctx.fill();
            ctx.closePath();

            // Balón
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#333";
            ctx.stroke();
            ctx.closePath();

            ball.y += ball.speedY;
            ball.radius += ball.speedRadius;

            if (ball.y > canvas.height + 50) {
                ball = { x: Math.random() * (600 - 200) + 200, y: 150, radius: 10, speedY: 2, speedRadius: 0.3 };
            }

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
