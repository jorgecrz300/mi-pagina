<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Juego de Plataformas - GitHub</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #222;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            background-color: #87CEEB; /* Color cielo */
            border: 4px solid #555;
            display: block;
            margin-top: 20px;
        }
        .instrucciones { margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Primer Juego en GitHub</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <p class="instrucciones">Usa las <b>Flechas</b> para moverte y <b>Espacio</b> para saltar.</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Configuración del jugador
        let player = {
            x: 50,
            y: 300,
            width: 40,
            height: 40,
            color: "#FF5733",
            speed: 5,
            dy: 0,
            jumpForce: 12,
            gravity: 0.6,
            grounded: false
        };

        // Teclas presionadas
        let keys = {};

        // Escuchar eventos del teclado
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            // Movimiento lateral
            if (keys['ArrowRight']) player.x += player.speed;
            if (keys['ArrowLeft']) player.x -= player.speed;

            // Salto (solo si está en el suelo)
            if (keys['Space'] && player.grounded) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }

            // Aplicar física (gravedad)
            player.dy += player.gravity;
            player.y += player.dy;

            // Colisión con el "suelo" (parte inferior del canvas)
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
                player.dy = 0;
                player.grounded = true;
            }

            // Evitar que salga por los lados
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            // Limpiar el canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar suelo (opcional, visual)
            ctx.fillStyle = "#654321";
            ctx.fillRect(0, canvas.height - 10, canvas.width, 10);

            // Dibujar jugador
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        // Iniciar el juego
        update();
    </script>
</body>
</html>
