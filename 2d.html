<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Parkour Adventure - GitHub</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background-color: #1a1a1a; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        canvas { background-color: #111; border: 4px solid #333; margin-top: 20px; }
        .ui { position: absolute; top: 10px; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <div class="ui">
        <h1>Parkour con Scroll</h1>
        <p>¡Avanza hacia la derecha! | Espacio para saltar</p>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let player = {
            x: 50, y: 300, width: 30, height: 30,
            color: "#00d4ff", speed: 5, dy: 0,
            jumpForce: 13, gravity: 0.6, grounded: false
        };

        // El nivel ahora es gigante (x hasta 2500)
        let platforms = [
            { x: 0, y: 380, w: 200, h: 20 },
            { x: 300, y: 300, w: 120, h: 20 },
            { x: 500, y: 220, w: 120, h: 20 },
            { x: 750, y: 280, w: 150, h: 20 },
            { x: 1000, y: 200, w: 100, h: 20 },
            { x: 1250, y: 320, w: 200, h: 20 },
            { x: 1550, y: 240, w: 100, h: 20 },
            { x: 1800, y: 150, w: 150, h: 20 },
            { x: 2100, y: 250, w: 100, h: 20 },
            { x: 2400, y: 200, w: 60, h: 10, goal: true } // META
        ];

        let keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            if (keys['ArrowRight']) player.x += player.speed;
            if (keys['ArrowLeft']) player.x -= player.speed;
            if (keys['Space'] && player.grounded) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }

            player.dy += player.gravity;
            player.y += player.dy;
            player.grounded = false;

            platforms.forEach(plat => {
                if (player.x < plat.x + plat.w &&
                    player.x + player.width > plat.x &&
                    player.y + player.height > plat.y &&
                    player.y + player.height < plat.y + plat.h + player.dy) {
                    
                    if (player.dy > 0) {
                        player.grounded = true;
                        player.dy = 0;
                        player.y = plat.y - player.height;
                        if (plat.goal) alert("¡Ganaste el Parkour!");
                    }
                }
            });

            if (player.y > canvas.height) { // Reset si cae
                player.x = 50; player.y = 300; player.dy = 0;
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- LÓGICA DE CÁMARA ---
            ctx.save();
            // Centrar la cámara en el jugador (desplazamos el dibujo)
            let cameraX = -player.x + canvas.width / 2;
            // Evitar que la cámara se mueva demasiado a la izquierda
            if (cameraX > 0) cameraX = 0; 
            
            ctx.translate(cameraX, 0);

            // Dibujar plataformas
            platforms.forEach(plat => {
                ctx.fillStyle = plat.goal ? "gold" : "#a2ff00";
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
            });

            // Dibujar jugador
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            ctx.restore(); 
            // --- FIN DE CÁMARA ---
        }

        update();
    </script>
</body>
</html>
