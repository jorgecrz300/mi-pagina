<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabotage Royale Ultra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="status-bar">
            <span>Puntos: $<span id="score">0</span></span>
            <span>Escudo: <span id="shield-status">OFF</span></span>
            <span>Usuarios Online: <span id="user-count">0</span></span>
        </div>

        <div id="game-map">
            <div class="finish-line">META</div>
            <div id="players-layer">
                </div>
        </div>

        <div id="quiz-overlay">
            <div id="question-card">
                <h2 id="question-text">Cargando preguntas...</h2>
                <div id="options-container">
                    </div>
            </div>
        </div>

        <div id="shop-bar">
            <button class="btn-buy" onclick="buyItem('invert', 50)">🌀 Invertir Rival ($50)</button>
            <button class="btn-buy" onclick="buyItem('shake', 30)">🫨 Terremoto ($30)</button>
            <button class="btn-buy" onclick="buyItem('shield', 40)">🛡️ Escudo ($40)</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
