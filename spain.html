<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabotage Royale - Ultra Edition</title>
    <style>
        /* --- CSS ESTILOS --- */
        :root {
            --primary: #e94560;
            --secondary: #0f3460;
            --dark: #1a1a2e;
            --accent: #00f2ff;
        }

        body {
            background: var(--dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        #ui-container {
            text-align: center;
            z-index: 10;
        }

        #stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid var(--primary);
        }

        #question-card {
            background: var(--secondary);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
            transition: border 0.3s;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #16213e;
            color: white;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .option-btn:hover {
            background: var(--primary);
            transform: scale(1.02);
        }

        #shop {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-buy {
            background: #222;
            color: #ddd;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-buy:hover { background: #333; border-color: var(--accent); }

        /* --- EFECTOS DE SABOTAJE --- */
        .effect-invert { filter: invert(1) rotate(180deg); }
        .effect-shake { animation: shake 0.2s infinite; }
        .shield-active { border: 4px solid var(--accent) !important; box-shadow: 0 0 20px var(--accent); }

        @keyframes shake {
            0% { transform: translate(3px, 3px); }
            50% { transform: translate(-3px, -3px); }
            100% { transform: translate(3px, -3px); }
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="stats">
            <div class="stat-box">💰 <span id="score">0</span></div>
            <div class="stat-box">🛡️ <span id="shield-status">OFF</span></div>
        </div>

        <div id="question-card">
            <h2 id="question-text">Cargando preguntas...</h2>
            <div id="options-container"></div>
        </div>

        <div id="shop">
            <button class="btn-buy" onclick="buyItem('invert', 50)">🌀 Invertir Rival ($50)</button>
            <button class="btn-buy" onclick="buyItem('shake', 30)">🫨 Terremoto ($30)</button>
            <button class="btn-buy" onclick="buyItem('shield', 40)">🛡️ Escudo ($40)</button>
            <button class="btn-buy" onclick="buyItem('bonus', 60)">⚡ Doble Puntos ($60)</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getDatabase, ref, set, onValue, onChildAdded } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

        // --- CONFIGURACIÓN ---
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            databaseURL: "https://TU_PROYECTO.firebaseio.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "ID",
            appId: "ID_APP"
        }; // <--- PEGA AQUÍ TUS CREDENCIALES DE FIREBASE

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myID = "User_" + Math.random().toString(36).substring(7);

        let score = 0;
        let hasShield = false;
        let multiplier = 1;

        const questions = [
            {q: "¿Cuál es el lenguaje de la web?", a: ["JS", "Python", "C++"], c: 0},
            {q: "¿Firebase es de...?", a: ["Apple", "Google", "Microsoft"], c: 1},
            {q: "¿CSS sirve para...?", a: ["Datos", "Estilos", "Servidores"], c: 1},
            {q: "¿GitHub es para...?", a: ["Código", "Cocinar", "Bailar"], c: 0}
        ];
        let currentQ = 0;

        // --- FUNCIONES CORE ---
        function renderQuestion() {
            const q = questions[currentQ];
            document.getElementById("question-text").innerText = q.q;
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            
            q.a.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                container.appendChild(btn);
            });
        }

        window.checkAnswer = function(index) {
            if (index === questions[currentQ].c) {
                score += (10 * multiplier);
            } else {
                score = Math.max(0, score - 5);
            }
            document.getElementById("score").innerText = score;
            currentQ = (currentQ + 1) % questions.length;
            renderQuestion();
        }

        window.buyItem = function(type, cost) {
            if (score >= cost) {
                score -= cost;
                document.getElementById("score").innerText = score;

                if (type === 'shield') {
                    activateShield();
                } else if (type === 'bonus') {
                    multiplier = 2;
                    setTimeout(() => multiplier = 1, 15000);
                } else {
                    // Enviar ataque a la base de datos
                    set(ref(db, 'global_attacks'), {
                        type: type,
                        attacker: myID,
                        time: Date.now()
                    });
                }
            } else {
                alert("¡Falta plata!");
            }
        }

        function activateShield() {
            hasShield = true;
            document.getElementById("shield-status").innerText = "ON";
            document.getElementById("question-card").classList.add("shield-active");
            setTimeout(() => {
                hasShield = false;
                document.getElementById("shield-status").innerText = "OFF";
                document.getElementById("question-card").classList.remove("shield-active");
            }, 10000);
        }

        // --- ESCUCHAR ATAQUES ---
        onValue(ref(db, 'global_attacks'), (snapshot) => {
            const data = snapshot.val();
            if (data && data.attacker !== myID) {
                if (!hasShield) {
                    document.body.classList.add(`effect-${data.type}`);
                    setTimeout(() => {
                        document.body.classList.remove(`effect-${data.type}`);
                    }, 5000);
                }
            }
        });

        renderQuestion();
    </script>
</body>
</html>
