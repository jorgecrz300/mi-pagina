<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Spain - Admin</title>
    <style>
        /* Estilos base para que se vea como en tu captura */
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        #btn-reiniciar {
            background-color: #ff4c4c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            display: block;
            margin: 10px auto;
        }

        #btn-reiniciar:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }

        /* Efecto de vibración que tenías en tu código */
        .effect-shake { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }

        /* Estilos simples para los paneles que se ven en tu imagen */
        #admin-panel {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <button id="btn-reiniciar">Reiniciar Tabla</button>
    </div>

    <div id="leaderboard">🏆 Top 3: <div id="rank-list"></div></div>
    
    <div id="admin-panel">
        <h2 style="color: #4cc9f0;">🛠 Admin: Juego Spain</h2>
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getDatabase, ref, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

        // Tu configuración exacta
        const firebaseConfig = {
            apiKey: "AIzaSyB5_FRkGDHgtZxEiUYua_nqaDCmt4_dsto",
            authDomain: "juego-spain.firebaseapp.com",
            projectId: "juego-spain",
            databaseURL: "https://juego-spain-default-rtdb.firebaseio.com/",
            storageBucket: "juego-spain.appspot.com",
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- LÓGICA DEL BOTÓN REINICIAR ---
        const btnReiniciar = document.getElementById('btn-reiniciar');

        btnReiniciar.addEventListener('click', () => {
            if (confirm("¿Estás seguro? Esto eliminará a TODOS los personajes de la pantalla.")) {
                
                // Referencia al nodo de jugadores
                const refJugadores = ref(db, 'jugadores');

                // Borrar datos en Firebase
                remove(refJugadores)
                    .then(() => {
                        console.log("Base de datos limpia.");
                        // Recargamos para limpiar el canvas local
                        location.reload(); 
                    })
                    .catch((error) => {
                        alert("Error al reiniciar: " + error.message);
                    });
            }
        });

        // NOTA: Para que los personajes se borren solos al salir, 
        // recuerda usar: onDisconnect(ref(db, 'jugadores/' + nombre)).remove();
        // dentro de tu función de inicio de jugador.

    </script>
</body>
</html>
