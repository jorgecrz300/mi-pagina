<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Casa Corregido</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 15px;
            text-align: center;
        }
        canvas {
            background-color: #ffffff;
            border: 3px solid #2c3e50;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .controls-info {
            margin-top: 15px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-size: 14px;
            color: #34495e;
        }
    </style>
</head>
<body>

    <h1>Plano Interactivo Modificado</h1>
    <p>Usa las <b>flechas del teclado</b>. Se han aplicado los cambios estructurales en los muros y habitaciones.</p>

    <canvas id="mapaCasa" width="500" height="750"></canvas>

    <div class="controls-info">
        <b>Cambios aplicados:</b> Muro removido camino al baño | Nuevo muro sólido cerrando el baño | Nueva línea sólida divisoria entre Habitación y Sala.
    </div>

    <script>
        const canvas = document.getElementById('mapaCasa');
        const ctx = canvas.getContext('2d');

        const TILE_SIZE = 25; 

        // Personita (Jugador) - Iniciando en la Sala
        let player = {
            x: 310, 
            y: 200,
            radius: 6,
            speed: 3
        };

        // Lista de muros sólidos actualizada según tus correcciones
        const solidWalls = [
            // --- BAÑO ---
            {x1: 50, y1: 100, x2: 50, y2: 150},
            {x1: 50, y1: 100, x2: 125, y2: 100},
            {x1: 50, y1: 150, x2: 100, y2: 150},
            {x1: 100, y1: 150, x2: 100, y2: 225}, // "aquí también" -> Se extiende la línea sólida vertical para cerrar el baño

            // --- HABITACIÓN SUPERIOR (Modificada) ---
            // {x1: 125, y1: 100, x2: 125, y2: 125}, -> ¡QUITADO! Este pedazo ya no existe
            {x1: 125, y1: 100, x2: 175, y2: 100}, 
            {x1: 175, y1: 100, x2: 225, y2: 100, isWindow: true}, // Ventana roja norte
            {x1: 225, y1: 100, x2: 250, y2: 100},
            {x1: 125, y1: 125, x2: 125, y2: 225}, // Muro izquierdo restante de la habitación
            {x1: 125, y1: 225, x2: 200, y2: 225}, // Muro inferior izquierdo
            
            // "pon una linea solida aqui" -> Nueva línea sólida divisoria entre Habitación y Sala
            {x1: 250, y1: 100, x2: 250, y2: 225}, 
            {x1: 235, y1: 225, x2: 250, y2: 225}, // Conexión inferior junto a la puerta curva

            // --- HABITACIÓN INFERIOR ---
            {x1: 125, y1: 275, x2: 125, y2: 325},
            {x1: 125, y1: 325, x2: 125, y2: 375, isWindow: true}, // Ventana izquierda
            {x1: 125, y1: 375, x2: 125, y2: 425},
            {x1: 125, y1: 275, x2: 200, y2: 275}, 
            {x1: 235, y1: 275, x2: 250, y2: 275}, 
            {x1: 250, y1: 275, x2: 250, y2: 425}, 
            {x1: 125, y1: 425, x2: 250, y2: 425}, 

            // --- SALA Y MUROS PERIMETRALES DERECHOS ---
            {x1: 250, y1: 100, x2: 375, y2: 100}, // Techo sala
            {x1: 375, y1: 100, x2: 375, y2: 125},
            {x1: 375, y1: 125, x2: 375, y2: 175, isWindow: true}, // Ventana der sup
            {x1: 375, y1: 175, x2: 375, y2: 200},
            {x1: 375, y1: 250, x2: 375, y2: 300}, // Muro der centro
            {x1: 375, y1: 300, x2: 375, y2: 350, isWindow: true}, // Ventana der inf
            {x1: 375, y1: 350, x2: 375, y2: 425},
            {x1: 250, y1: 425, x2: 300, y2: 425}, 
            {x1: 350, y1: 425, x2: 375, y2: 425}, 

            // --- COCINA / PALAPA ---
            {x1: 200, y1: 525, x2: 200, y2: 600}, 
            {x1: 200, y1: 600, x2: 325, y2: 600}, 
            {x1: 325, y1: 600, x2: 325, y2: 525}  
        ];

        let keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function checkCollision(nx, ny, r, line) {
            let A = nx - line.x1;
            let B = ny - line.y1;
            let C = line.x2 - line.x1;
            let D = line.y2 - line.y1;

            let dot = A * C + B * D;
            let len_sq = C * C + D * D;
            let param = -1;
            if (len_sq != 0) param = dot / len_sq;

            let xx, yy;

            if (param < 0) {
                xx = line.x1;
                yy = line.y1;
            } else if (param > 1) {
                xx = line.x2;
                yy = line.y2;
            } else {
                xx = line.x1 + param * C;
                yy = line.y1 + param * D;
            }

            let dx = nx - xx;
            let dy = ny - yy;
            let distance = Math.sqrt(dx * dx + dy * dy);

            return distance < r;
        }

        function drawGrid() {
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += TILE_SIZE) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += TILE_SIZE) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
        }

        function drawMap() {
            solidWalls.forEach(w => {
                ctx.beginPath();
                ctx.moveTo(w.x1, w.y1);
                ctx.lineTo(w.x2, w.y2);
                if (w.isWindow) {
                    ctx.strokeStyle = '#e74c3c'; 
                    ctx.lineWidth = 5;
                } else {
                    ctx.strokeStyle = '#1a1a1a'; 
                    ctx.lineWidth = 4;
                }
                ctx.stroke();
            });

            // Arcos de puertas
            ctx.strokeStyle = '#bdc3c7';
            ctx.lineWidth = 2;
            ctx.setLineDash([3, 3]);
            const doors = [
                {x: 112, y: 150, r: 12, s: 0, e: Math.PI}, // Puerta baño
                {x: 215, y: 225, r: 15, s: 0, e: Math.PI}, // Puerta cuarto sup
                {x: 215, y: 275, r: 15, s: Math.PI, e: 0},   // Puerta cuarto inf
                {x: 375, y: 225, r: 25, s: Math.PI*1.5, e: Math.PI*0.5},
                {x: 325, y: 425, r: 25, s: 0, e: Math.PI}
            ];
            doors.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, d.r, d.s, d.e); ctx.stroke();
            });
            ctx.setLineDash([]); 

            // Textos de habitaciones
            ctx.fillStyle = '#2c3e50';
            ctx.font = 'bold 12px Arial';
            ctx.fillText("Baño", 65, 130);
            ctx.fillText("Habitación", 145, 160);
            ctx.fillText("Habitación", 155, 340);
            ctx.fillText("Sala", 305, 250);
            ctx.fillText("Cocina/palapa", 220, 565);

            // Corredores
            ctx.fillStyle = '#95a5a6';
            ctx.font = 'italic 12px Arial';
            ctx.fillText("Corredor", 60, 280);
            ctx.fillText("Corredor", 400, 280);
        }

        function updateMovement() {
            let nextX = player.x;
            let nextY = player.y;

            if (keys['ArrowUp'] || keys['KeyW']) nextY -= player.speed;
            if (keys['ArrowDown'] || keys['KeyS']) nextY += player.speed;
            if (keys['ArrowLeft'] || keys['KeyA']) nextX -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) nextX += player.speed;

            let collisionX = false;
            let collisionY = false;

            for (let wall of solidWalls) {
                if (checkCollision(nextX, player.y, player.radius, wall)) {
                    collisionX = true;
                }
                if (checkCollision(player.x, nextY, player.radius, wall)) {
                    collisionY = true;
                }
            }

            if (!collisionX && nextX - player.radius > 0 && nextX + player.radius < canvas.width) {
                player.x = nextX;
            }
            if (!collisionY && nextY - player.radius > 0 && nextY + player.radius < canvas.height) {
                player.y = nextY;
            }
        }

        function drawPlayer() {
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#3498db'; 
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0; 
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            drawMap();
            updateMovement();
            drawPlayer();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
