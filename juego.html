<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Clicker: Global Network</title>
    <style>
        :root { --main-color: #00ff41; --bg-color: #050505; --accent: #ff00ff; }
        body { background: var(--bg-color); color: var(--main-color); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; user-select: none; overflow-x: hidden; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { border: 2px solid var(--main-color); padding: 30px; text-align: center; border-radius: 10px; background: #0a0a0a; box-shadow: 0 0 20px var(--main-color); }
        input { background: #111; color: var(--main-color); border: 1px solid var(--main-color); padding: 10px; margin: 10px; text-align: center; outline: none; }

        .leaderboard { position: fixed; top: 10px; right: 10px; width: 220px; background: rgba(0,0,0,0.9); border: 1px solid var(--accent); padding: 10px; border-radius: 5px; font-size: 10px; z-index: 90; box-shadow: 0 0 10px var(--accent); max-height: 200px; overflow-y: auto; }
        .leaderboard h3 { margin: 0 0 8px 0; color: var(--accent); text-align: center; font-size: 12px; border-bottom: 1px solid var(--accent); }
        .rank-item { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 4px 0; }
        .rank-name { color: var(--main-color); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 90px; }

        .header { text-align: center; border: 1px solid var(--main-color); padding: 15px; border-radius: 10px; width: 100%; max-width: 450px; background: rgba(0,255,65,0.02); margin-top: 50px; }
        #stats { font-size: 28px; font-weight: bold; margin: 5px 0; text-shadow: 0 0 10px var(--main-color); }
        
        .roulette-container { width: 300px; height: 60px; border: 2px solid var(--accent); margin: 15px 0; position: relative; overflow: hidden; background: #111; border-radius: 8px; }
        .roulette-rail { display: flex; position: absolute; left: 0; transition: left 3s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .slot { min-width: 100px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border-right: 1px solid #222; }
        .pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 100%; background: white; z-index: 10; }

        #pc-target { width: 100px; cursor: pointer; transition: 0.1s; margin: 10px 0; filter: drop-shadow(0 0 10px var(--main-color)); }
        #pc-target:active { transform: scale(0.9); }

        .grid-tienda { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 480px; }
        .item { border: 1px solid var(--main-color); padding: 10px; border-radius: 8px; text-align: center; background: rgba(255,255,255,0.03); }
        
        button { background: var(--main-color); color: black; border: none; padding: 8px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; margin-top: 5px; font-size: 10px; }
        button:disabled { background: #222; color: #444; }
        .btn-gamble { background: var(--accent); color: white; font-size: 9px; }
        .count-badge { color: #fbff00; font-size: 10px; display: block; margin-bottom: 3px; }

        #hacker-alert-btn { position: fixed; z-index: 2000; padding: 15px 25px; background: #ff0000; color: white; border: 3px solid #fff; font-weight: bold; cursor: pointer; display: none; box-shadow: 0 0 20px #ff0000; border-radius: 5px; animation: flash 0.5s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #adminBtn { position: fixed; bottom: 0; right: 0; width: 30px; height: 30px; opacity: 0; z-index: 999; }
    </style>
</head>
<body>

    <button id="hacker-alert-btn">¡STOP HACKER!</button>

    <div class="leaderboard">
        <h3>🏆 GLOBAL RANKING</h3>
        <div id="leaderboard-list">Cargando red...</div>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <h2>ACCESS TERMINAL</h2>
            <input type="text" id="username-input" placeholder="Hacker Name..." maxlength="12">
            <button id="btn-login">INITIALIZE</button>
        </div>
    </div>

    <div class="header">
        <div style="font-size: 11px; color: var(--accent);">
            HACKER: <span id="current-user">---</span> | REVIVE: <span id="rebirth-val">0</span>
        </div>
        <div id="stats">💰 <span id="puntos">0</span> BTC</div>
        <div id="log" style="font-size: 12px; margin: 10px; color: yellow;">CONNECTING TO SERVER...</div>
    </div>

    <div class="roulette-container">
        <div class="pointer"></div>
        <div class="roulette-rail" id="rail"></div>
    </div>

    <img id="pc-target" src="https://cdn-icons-png.flaticon.com/512/689/689304.png">

    <div class="grid-tienda">
        <div class="item" style="grid-column: span 2; border-color: #00ccff;">
            <button id="btnRebirth" style="background:#00ccff;">REBIRTH (50k BTC)</button>
        </div>

        <div class="item" style="grid-column: span 2; border-color: var(--accent); display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <button class="btn-gamble" id="gamble-1">NOVATO (75% -> 100)</button>
            <button class="btn-gamble" id="gamble-2">MEDIO (45% -> 10k)</button>
            <button class="btn-gamble" id="gamble-3">MEJOR (30% -> 50k)</button>
            <button class="btn-gamble" id="gamble-4">MAESTRO (0.1% -> 50B)</button>
        </div>

        <div class="item">
            <span>CPU (+2)</span>
            <button id="btnUp">50 BTC</button>
        </div>

        <div class="item">
            <span class="count-badge">BOTS: <span id="bot-count">0</span></span>
            <button id="btnAuto">150 BTC</button>
        </div>
    </div>

    <div id="adminBtn"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5MMVzYmwhm38MgMUTKyYgdpVSyPOYscw",
            authDomain: "cyberclicker-78621.firebaseapp.com",
            databaseURL: "https://cyberclicker-78621-default-rtdb.firebaseio.com",
            projectId: "cyberclicker-78621",
            storageBucket: "cyberclicker-78621.firebasestorage.app",
            messagingSenderId: "161403727205",
            appId: "1:161403727205:web:711bc83f5b337e696ac58c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Variables de Juego
        let user = "";
        let data = { pts: 0, pwr: 2, bots: 0, rb: 0 };
        let modoDios = false;
        let girando = false;
        let timerRobo, intervaloMovimiento;

        // --- FUNCIONES CORE ---

        async function login() {
            const nameInput = document.getElementById('username-input').value.trim().toUpperCase();
            if (!nameInput) return;
            user = nameInput;
            
            const userRef = ref(db, 'users/' + user);
            const snapshot = await get(userRef);
            
            if (snapshot.exists()) {
                data = snapshot.val();
                document.getElementById('log').innerText = "DATA RESTORED";
            } else {
                await set(userRef, data);
                document.getElementById('log').innerText = "NEW PROFILE CREATED";
            }

            document.getElementById('current-user').innerText = user;
            document.getElementById('login-overlay').style.display = 'none';
            actualizarUI();
            escucharLeaderboard();
        }

        function guardarEnNube() {
            if (!user) return;
            update(ref(db, 'users/' + user), data);
        }

        function escucharLeaderboard() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                const allUsers = snapshot.val();
                const sorted = Object.entries(allUsers)
                    .map(([name, val]) => ({ name, ...val }))
                    .sort((a, b) => (b.rb * 1000000 + b.pts) - (a.rb * 1000000 + a.pts))
                    .slice(0, 10);

                const list = document.getElementById('leaderboard-list');
                list.innerHTML = sorted.map((u, i) => `
                    <div class="rank-item">
                        <span class="rank-name">${i+1}. ${u.name}</span>
                        <span>RB:${u.rb} | 💰${Math.floor(u.pts).toLocaleString()}</span>
                    </div>
                `).join('');
            });
        }

        function actualizarUI() {
            document.getElementById('puntos').innerText = Math.floor(data.pts).toLocaleString();
            document.getElementById('rebirth-val').innerText = data.rb;
            document.getElementById('bot-count').innerText = data.bots;
            document.getElementById('btnUp').disabled = data.pts < 50;
            document.getElementById('btnAuto').disabled = data.pts < 150;
            document.getElementById('btnRebirth').disabled = data.pts < 50000;
        }

        // --- ACCIONES DEL JUGADOR ---

        const clickPc = () => {
            data.pts += (data.pwr * (1 + data.rb * 0.5));
            actualizarUI();
        };

        const jugar = (prob, premio, costo) => {
            if (girando || data.pts < costo) return;
            data.pts -= costo; girando = true; actualizarUI();
            
            const rail = document.getElementById('rail');
            rail.style.transition = "none"; rail.style.left = "0px"; rail.innerHTML = '';
            for(let i=0; i<30; i++) {
                const s = document.createElement('div'); s.className = 'slot';
                s.innerText = "HACKING"; rail.appendChild(s);
            }
            
            const exito = modoDios ? true : (Math.random() * 100 <= prob);
            setTimeout(() => { rail.style.transition = "left 2.5s ease-out"; rail.style.left = "-2000px"; }, 50);
            setTimeout(() => {
                girando = false;
                if(exito) { data.pts += premio; document.getElementById('log').innerText = "WIN: +" + premio; }
                else { document.getElementById('log').innerText = "LOST"; }
                actualizarUI(); guardarEnNube();
            }, 2550);
        };

        // --- EVENTOS Y LISTENERS ---
        document.getElementById('btn-login').onclick = login;
        document.getElementById('pc-target').onclick = clickPc;
        document.getElementById('btnUp').onclick = () => { if(data.pts >= 50){ data.pts -= 50; data.pwr += 2; actualizarUI(); guardarEnNube(); } };
        document.getElementById('btnAuto').onclick = () => { if(data.pts >= 150){ data.pts -= 150; data.bots++; actualizarUI(); guardarEnNube(); } };
        document.getElementById('btnRebirth').onclick = () => { if(data.pts >= 50000){ data.rb++; data.pts=0; data.pwr=2; data.bots=0; actualizarUI(); guardarEnNube(); } };
        
        document.getElementById('gamble-1').onclick = () => jugar(75, 100, 1);
        document.getElementById('gamble-2').onclick = () => jugar(45, 10000, 500);
        document.getElementById('gamble-3').onclick = () => jugar(30, 50000, 1000);
        document.getElementById('gamble-4').onclick = () => jugar(0.1, 50000000000, 20000000);

        // Bots produciendo BTC
        setInterval(() => {
            if(data.bots > 0){
                data.pts += (data.bots * (1 + data.rb * 0.5));
                actualizarUI();
            }
        }, 1000);

        // Guardado automático cada 10 segundos
        setInterval(guardarEnNube, 10000);
        
        // Admin
        document.getElementById('adminBtn').onclick = () => {
            const code = prompt("ADMIN:");
            if(code === "JORGE_GOD") data.pts += 1000000000;
            if(code === "SUERTE_MAX") modoDios = true;
            actualizarUI(); guardarEnNube();
        };

    </script>
</body>
</html>
