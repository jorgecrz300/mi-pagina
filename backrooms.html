<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms: Classic Infinite Level 0</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #15140f;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 22px;
            color: #d1b464;
            text-shadow: 2px 2px #000;
            letter-spacing: 2px;
        }
        canvas {
            background-color: #dfca80; /* Color alfombra */
            border: 4px solid #3a321d;
            box-shadow: 0px 0px 30px rgba(0, 0, 0, 0.8);
        }
        .instructions {
            margin-top: 15px;
            font-size: 13px;
            color: #7a725d;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>THE BACKROOMS - INF_LEVEL_0</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="instructions">Usa WASD o las Flechas del teclado para explorar el laberinto infinito.</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Configuración del tamaño de las habitaciones y grosor de paredes
        const TILE_SIZE = 100; 
        const WALL_THICKNESS = 6; // Paredes delgadas
        const PLAYER_SPEED = 4;

        const player = {
            worldX: 0,
            worldY: 0,
            radius: 10,
            screenX: canvas.width / 2,
            screenY: canvas.height / 2
        };

        const keys = {};

        // Generador matemático para el mapa infinito
        function pseudoRandom(x, y) {
            const h = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453123;
            return h - Math.floor(h);
        }

        // Determina qué paredes delgadas tiene una celda matemática
        function getCellWalls(tileX, tileY) {
            const inRoomX = tileX % 4;
            const inRoomY = tileY % 4;

            let top = false, bottom = false, left = false, right = false;

            // Crear cuadrícula inicial de habitaciones
            if (inRoomY === 0) top = true;
            if (inRoomY === 3) bottom = true;
            if (inRoomX === 0) left = true;
            if (inRoomX === 3) right = true;

            // Quitar segmentos de pared de forma aleatoria para conectar los cuartos y hacer pasillos
            const seed = pseudoRandom(Math.floor(tileX / 4), Math.floor(tileY / 4));
            
            if (seed < 0.4 && inRoomX > 0 && inRoomX < 3) top = false;
            if (seed > 0.6 && inRoomX > 0 && inRoomX < 3) bottom = false;
            if (seed < 0.5 && inRoomY > 0 && inRoomY < 3) left = false;
            if (seed > 0.3 && inRoomY > 0 && inRoomY < 3) right = false;

            // Columnas sueltas típicas del diseño de los Backrooms
            if (inRoomX === 2 && inRoomY === 2 && pseudoRandom(tileX, tileY) < 0.35) {
                top = true;
                left = true;
            }

            return { top, bottom, left, right };
        }

        window.addEventListener("keydown", (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

        // Sistema de colisiones preciso para paredes delgadas
        function canMoveTo(worldX, worldY) {
            const buffer = player.radius;
            
            // Revisar puntos alrededor del jugador
            const checkPoints = [
                {x: worldX - buffer, y: worldY},
                {x: worldX + buffer, y: worldY},
                {x: worldX, y: worldY - buffer},
                {x: worldX, y: worldY + buffer}
            ];

            for (let p of checkPoints) {
                const tx = Math.floor(p.x / TILE_SIZE);
                const ty = Math.floor(p.y / TILE_SIZE);
                
                const walls = getCellWalls(tx, ty);
                const innerX = p.x % TILE_SIZE;
                const innerY = p.y % TILE_SIZE;

                // Colisión con la pared superior delgada
                if (walls.top && innerY < WALL_THICKNESS) return false;
                // Colisión con la pared inferior delgada
                if (walls.bottom && innerY > TILE_SIZE - WALL_THICKNESS) return false;
                // Colisión con la pared izquierda delgada
                if (walls.left && innerX < WALL_THICKNESS) return false;
                // Colisión con la pared derecha delgada
                if (walls.right && innerX > TILE_SIZE - WALL_THICKNESS) return false;
            }
            return true;
        }

        function update() {
            let dx = 0, dy = 0;
            if (keys["arrowup"] || keys["w"]) dy = -PLAYER_SPEED;
            if (keys["arrowdown"] || keys["s"]) dy = PLAYER_SPEED;
            if (keys["arrowleft"] || keys["a"]) dx = -PLAYER_SPEED;
            if (keys["arrowright"] || keys["d"]) dx = PLAYER_SPEED;

            // Movimiento independiente en ejes para deslizamiento suave en esquinas
            if (dx !== 0 && canMoveTo(player.worldX + dx, player.worldY)) player.worldX += dx;
            if (dy !== 0 && canMoveTo(player.worldX, player.worldY + dy)) player.worldY += dy;
        }

        function draw() {
            // Suelo: Alfombra vieja de los Backrooms
            ctx.fillStyle = "#dfca80";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Calcular las celdas visibles en pantalla
            const startTileX = Math.floor((player.worldX - canvas.width / 2) / TILE_SIZE) - 1;
            const endTileX = Math.ceil((player.worldX + canvas.width / 2) / TILE_SIZE) + 1;
            const startTileY = Math.floor((player.worldY - canvas.height / 2) / TILE_SIZE) - 1;
            const endTileY = Math.ceil((player.worldY + canvas.height / 2) / TILE_SIZE) + 1;

            // Dibujar paredes delgadas amarillas
            ctx.fillStyle = "#b59948"; // Amarillo mostaza oscuro para las paredes

            for (let ty = startTileY; ty <= endTileY; ty++) {
                for (let tx = startTileX; tx <= endTileX; tx++) {
                    const walls = getCellWalls(tx, ty);
                    
                    const screenX = tx * TILE_SIZE - player.worldX + canvas.width / 2;
                    const screenY = ty * TILE_SIZE - player.worldY + canvas.height / 2;

                    if (walls.top) {
                        ctx.fillRect(screenX, screenY, TILE_SIZE, WALL_THICKNESS);
                    }
                    if (walls.bottom) {
                        ctx.fillRect(screenX, screenY + TILE_SIZE - WALL_THICKNESS, TILE_SIZE, WALL_THICKNESS);
                    }
                    if (walls.left) {
                        ctx.fillRect(screenX, screenY, WALL_THICKNESS, TILE_SIZE);
                    }
                    if (walls.right) {
                        ctx.fillRect(screenX + TILE_SIZE - WALL_THICKNESS, screenY, WALL_THICKNESS, TILE_SIZE);
                    }
                }
            }

            // Dibujar Jugador
            ctx.beginPath();
            ctx.arc(player.screenX, player.screenY, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#3a3525"; // Silueta oscura del personaje
            ctx.fill();
            ctx.closePath();

            // Iluminación/Efecto de viñeta (La lámpara fluorescente perdiendo fuerza en las esquinas)
            const gradient = ctx.createRadialGradient(player.screenX, player.screenY, 40, player.screenX, player.screenY, 340);
            gradient.addColorStop(0, "rgba(0,0,0,0)");
            gradient.addColorStop(1, "rgba(20, 15, 0, 0.65)"); 
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Posición inicial del jugador en un área limpia
        player.worldX = 2 * TILE_SIZE + TILE_SIZE / 2;
        player.worldY = 2 * TILE_SIZE + TILE_SIZE / 2;

        gameLoop();
    </script>
</body>
</html>
