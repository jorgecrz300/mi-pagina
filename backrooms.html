<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms: Top-Down HTML</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #1a1a11;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 24px;
            color: #bc9c4a;
            text-shadow: 2px 2px #000;
        }
        canvas {
            background-color: #e6d28c; /* Color alfombra húmeda */
            border: 4px solid #3a321d;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.7);
        }
        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>THE BACKROOMS - NIVEL 0</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="instructions">Usa las flechas del teclado o WASD para moverte. Evita quedarte atrapado.</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Configuración
        const TILE_SIZE = 40;
        const PLAYER_SPEED = 4;

        // Colores
        const COLOR_PARED = "#be105a" ? "#bd9f5a" : "#bd9f5a"; // Amarillo pared viejo
        const COLOR_LINEA = "#1a1914";
        const COLOR_JUGADOR = "#323232";

        // Jugador
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 20, // Diámetro aproximado para colisiones
            radius: 10
        };

        // Teclas presionadas
        const keys = {};

        // Generar laberinto
        const walls = [];
        const rows = canvas.height / TILE_SIZE;
        const cols = canvas.width / TILE_SIZE;

        function generateBackrooms() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    // Bordes del mapa
                    if (r === 0 || r === rows - 1 || c === 0 || c === cols - 1) {
                        walls.push({ x: c * TILE_SIZE, y: r * TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE });
                    } 
                    // Paredes internas aleatorias (25% de probabilidad)
                    else if (Math.random() < 0.25) {
                        // Respetar la zona central de aparición del jugador
                        if (!(c > 7 && c < 13 && r > 5 && r < 9)) {
                            walls.push({ x: c * TILE_SIZE, y: r * TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE });
                        }
                    }
                }
            }
        }

        // Detectar teclas
        window.addEventListener("keydown", (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

        // Función para comprobar colisiones individuales
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.size > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.size > rect2.y;
        }

        // Actualizar lógica del juego
        function update() {
            let dx = 0;
            let dy = 0;

            if (keys["arrowup"] || keys["w"]) dy = -PLAYER_SPEED;
            if (keys["arrowdown"] || keys["s"]) dy = PLAYER_SPEED;
            if (keys["arrowleft"] || keys["a"]) dx = -PLAYER_SPEED;
            if (keys["arrowright"] || keys["d"]) dx = PLAYER_SPEED;

            // Movimiento en X con colisión ficticia (usando un cuadrado invisible para el jugador)
            player.x += dx;
            let playerBox = { x: player.x - player.radius, y: player.y - player.radius, size: player.radius * 2 };
            for (let wall of walls) {
                if (checkCollision(playerBox, wall)) {
                    if (dx > 0) player.x = wall.x - player.radius;
                    if (dx < 0) player.x = wall.x + wall.w + player.radius;
                }
            }

            // Movimiento en Y con colisión
            player.y += dy;
            playerBox = { x: player.x - player.radius, y: player.y - player.radius, size: player.radius * 2 };
            for (let wall of walls) {
                if (checkCollision(playerBox, wall)) {
                    if (dy > 0) player.y = wall.y - player.radius;
                    if (dy < 0) player.y = wall.y + wall.h + player.radius;
                }
            }
        }

        // Dibujar todo en la pantalla
        function draw() {
            // Limpiar pantalla con el color de la alfombra
            ctx.fillStyle = "#e6d28c";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar paredes
            ctx.fillStyle = COLOR_PARED;
            ctx.strokeStyle = COLOR_LINEA;
            ctx.lineWidth = 1;

            for (let wall of walls) {
                ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
                ctx.strokeRect(wall.x, wall.y, wall.w, wall.h);
            }

            // Dibujar jugador (vista cenital)
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = COLOR_JUGADOR;
            ctx.fill();
            ctx.closePath();
        }

        // Bucle del juego
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Iniciar
        generateBackrooms();
        gameLoop();
    </script>
</body>
</html>
