<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms: Infinite Rooms</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #11110b;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 24px;
            color: #bc9c4a;
            text-shadow: 2px 2px #000;
            letter-spacing: 2px;
        }
        canvas {
            background-color: #dfca80; /* Alfombra beige/amarilla */
            border: 4px solid #3a321d;
            box-shadow: 0px 0px 30px rgba(0, 0, 0, 0.8);
        }
        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #8c846e;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>THE BACKROOMS: INFINITE ROOMS</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="instructions">Usa WASD o las Flechas. Camina en cualquier dirección, las habitaciones son infinitas...</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Configuración del mundo
        const TILE_SIZE = 60; // Tamaño de cada bloque de pared
        const PLAYER_SPEED = 4;

        // El jugador se queda estático en el centro de la pantalla.
        // Lo que se mueve es el "mundo" (la cámara).
        const player = {
            worldX: 0,
            worldY: 0,
            radius: 12,
            screenX: canvas.width / 2,
            screenY: canvas.height / 2
        };

        const keys = {};

        // Función matemática para generar ruido pseudo-aleatorio basado en coordenadas (Semilla)
        function pseudoRandom(x, y) {
            const h = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453123;
            return h - Math.floor(h);
        }

        // Determina si hay una pared en una coordenada del mundo
        function isWall(tileX, tileY) {
            // Generar una estructura tipo "habitaciones" usando cuadrículas
            // Cada 5 bloques creamos la estructura de una habitación
            const inRoomX = tileX % 6;
            const inRoomY = tileY % 6;

            // Hacer paredes exteriores para las habitaciones
            if (inRoomX === 0 || inRoomY === 0) {
                // Dejar aperturas (puertas) de forma pseudo-aleatoria para conectar los cuartos
                const seed = pseudoRandom(Math.floor(tileX / 6), Math.floor(tileY / 6));
                
                // Si estamos en los bloques del medio de la pared, hay probabilidad de que sea una puerta
                if ((inRoomX === 0 && (tileY % 6 === 3 || tileY % 6 === 4)) || 
                    (inRoomY === 0 && (tileX % 6 === 3 || tileX % 6 === 4))) {
                    return false; // Es un espacio abierto (puerta)
                }
                return true; // Es pared de la habitación
            }

            // Algunos pilares o paredes sueltas dentro de las habitaciones para romper la monotonía
            if (inRoomX === 3 && inRoomY === 3 && pseudoRandom(tileX, tileY) < 0.4) {
                return true;
            }

            return false;
        }

        // Detectar entrada de teclado
        window.addEventListener("keydown", (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

        // Comprobación de colisión con las paredes del mundo
        function canMoveTo(worldX, worldY) {
            // Revisar los 4 bordes del jugador (caja de colisión simplificada)
            const checkPoints = [
                { x: worldX - player.radius, y: worldY - player.radius },
                { x: worldX + player.radius, y: worldY - player.radius },
                { x: worldX - player.radius, y: worldY + player.radius },
                { x: worldX + player.radius, y: worldY + player.radius }
            ];

            for (let p of checkPoints) {
                const tileX = Math.floor(p.x / TILE_SIZE);
                const tileY = Math.floor(p.y / TILE_SIZE);
                if (isWall(tileX, tileY)) {
                    return false; // Choca con pared
                }
            }
            return true;
        }

        function update() {
            let dx = 0;
            let dy = 0;

            if (keys["arrowup"] || keys["w"]) dy = -PLAYER_SPEED;
            if (keys["arrowdown"] || keys["s"]) dy = PLAYER_SPEED;
            if (keys["arrowleft"] || keys["a"]) dx = -PLAYER_SPEED;
            if (keys["arrowright"] || keys["d"]) dx = PLAYER_SPEED;

            // Intentar mover en X
            if (dx !== 0 && canMoveTo(player.worldX + dx, player.worldY)) {
                player.worldX += dx;
            }
            // Intentar mover en Y
            if (dy !== 0 && canMoveTo(player.worldX, player.worldY + dy)) {
                player.worldY += dy;
            }
        }

        function draw() {
            // Fondo: Color alfombra sucia
            ctx.fillStyle = "#dfca80";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Calcular qué rango de bloques son visibles actualmente en la pantalla
            const startTileX = Math.floor((player.worldX - canvas.width / 2) / TILE_SIZE) - 1;
            const endTileX = Math.ceil((player.worldX + canvas.width / 2) / TILE_SIZE) + 1;
            const startTileY = Math.floor((player.worldY - canvas.height / 2) / TILE_SIZE) - 1;
            const endTileY = Math.ceil((player.worldY + canvas.height / 2) / TILE_SIZE) + 1;

            // Dibujar las paredes visibles
            ctx.fillStyle = "#bfa65a"; // Amarillo oscuro para las paredes
            ctx.strokeStyle = "#2e2715"; // Bordes de bloques
            ctx.lineWidth = 2;

            for (let ty = startTileY; ty <= endTileY; ty++) {
                for (let tx = startTileX; tx <= endTileX; tx++) {
                    if (isWall(tx, ty)) {
                        // Convertir la posición global del mundo a la posición relativa de la pantalla
                        const screenX = tx * TILE_SIZE - player.worldX + canvas.width / 2;
                        const screenY = ty * TILE_SIZE - player.worldY + canvas.height / 2;
                        
                        ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                        ctx.strokeRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                    }
                }
            }

            // Dibujar al jugador justo en el centro de la pantalla
            ctx.beginPath();
            ctx.arc(player.screenX, player.screenY, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#2b2b2b"; // Color de la silueta del jugador
            ctx.fill();
            
            // Efecto de sombra sutil alrededor del jugador (Linterna tenue)
            const gradient = ctx.createRadialGradient(player.screenX, player.screenY, 20, player.screenX, player.screenY, 280);
            gradient.addColorStop(0, "rgba(0,0,0,0)");
            gradient.addColorStop(1, "rgba(0,0,0,0.65)"); // Oscuridad en las esquinas
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Iniciar el juego en una zona libre de paredes
        player.worldX = 3 * TILE_SIZE + TILE_SIZE/2;
        player.worldY = 3 * TILE_SIZE + TILE_SIZE/2;

        gameLoop();
    </script>
</body>
</html>
