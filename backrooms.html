<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms: Glitch Blueprint</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #050505;
            color: #fff;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 20px;
            color: #ff3333;
            letter-spacing: 4px;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.6);
        }
        canvas {
            background-color: #000000;
            border: 3px solid #222;
            box-shadow: 0px 0px 40px rgba(255, 0, 100, 0.2);
        }
        .instructions {
            margin-top: 15px;
            font-size: 12px;
            color: #555;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>LEVEL_0_BLUEPRINT.EXE</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="instructions">CONTROLES: WASD / FLECHAS - EXPLORACIÓN INFINITA</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const TILE_SIZE = 80; // Habitaciones un poco más grandes para apreciar las líneas
        const PLAYER_SPEED = 4;

        const player = {
            worldX: 0,
            worldY: 0,
            radius: 8,
            screenX: canvas.width / 2,
            screenY: canvas.height / 2
        };

        const keys = {};

        // Función de ruido matemático para el mapa infinito
        function pseudoRandom(x, y) {
            const h = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453123;
            return h - Math.floor(h);
        }

        // Retorna qué tipo de paredes tiene una celda en el mundo de forma infinita
        function getCellWalls(tileX, tileY) {
            const inRoomX = tileX % 5;
            const inRoomY = tileY % 5;

            let top = false, bottom = false, left = false, right = false;

            // Generar cuadrícula básica de habitaciones
            if (inRoomY === 0) top = true;
            if (inRoomY === 4) bottom = true;
            if (inRoomX === 0) left = true;
            if (inRoomX === 4) right = true;

            // Romper paredes aleatoriamente para crear pasillos y aperturas conectadas
            const roomSeed = pseudoRandom(Math.floor(tileX / 5), Math.floor(tileY / 5));
            
            if (roomSeed < 0.4 && (inRoomX === 2 || inRoomX === 3)) top = false;
            if (roomSeed > 0.6 && (inRoomX === 2 || inRoomX === 3)) bottom = false;
            if (roomSeed < 0.5 && (inRoomY === 2 || inRoomY === 3)) left = false;
            if (roomSeed > 0.3 && (inRoomY === 2 || inRoomY === 3)) right = false;

            // Añadir líneas sueltas estilo pilar dentro de cuartos
            if (inRoomX === 2 && inRoomY === 2 && pseudoRandom(tileX, tileY) < 0.5) {
                left = true;
                top = true;
            }

            return { top, bottom, left, right };
        }

        // Obtiene el color de neón/glitch basado en la posición para imitar la imagen
        function getGlitchColor(tx, ty) {
            const rand = pseudoRandom(tx, ty);
            if (rand < 0.25) return "rgba(255, 50, 50, 0.85)";   // Rojo brillante
            if (rand < 0.50) return "rgba(50, 255, 150, 0.85)";  // Verde/Cian
            if (rand < 0.75) return "rgba(240, 240, 100, 0.85)"; // Amarillo/Blanco
            return "rgba(180, 80, 255, 0.85)";                  // Morado/Magenta
        }

        window.addEventListener("keydown", (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

        // Detección de colisiones contra los bordes/líneas del mapa
        function canMoveTo(worldX, worldY) {
            const buffer = player.radius + 2;
            const checkPoints = [
                {x: worldX - buffer, y: worldY},
                {x: worldX + buffer, y: worldY},
                {x: worldX, y: worldY - buffer},
                {x: worldX, y: worldY + buffer}
            ];

            for (let p of checkPoints) {
                const tx = Math.floor(p.x / TILE_SIZE);
                const ty = Math.floor(p.y / TILE_SIZE);
                
                const walls = getCellWalls(tx, ty);
                const innerX = p.x % TILE_SIZE;
                const innerY = p.y % TILE_SIZE;

                // Si choca con el borde de una línea activada
                if (walls.top && innerY < 6) return false;
                if (walls.bottom && innerY > TILE_SIZE - 6) return false;
                if (walls.left && innerX < 6) return false;
                if (walls.right && innerX > TILE_SIZE - 6) return false;
            }
            return true;
        }

        function update() {
            let dx = 0, dy = 0;
            if (keys["arrowup"] || keys["w"]) dy = -PLAYER_SPEED;
            if (keys["arrowdown"] || keys["s"]) dy = PLAYER_SPEED;
            if (keys["arrowleft"] || keys["a"]) dx = -PLAYER_SPEED;
            if (keys["arrowright"] || keys["d"]) dx = PLAYER_SPEED;

            if (dx !== 0 && canMoveTo(player.worldX + dx, player.worldY)) player.worldX += dx;
            if (dy !== 0 && canMoveTo(player.worldX, player.worldY + dy)) player.worldY += dy;
        }

        function draw() {
            // Fondo oscuro puro
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const startTileX = Math.floor((player.worldX - canvas.width / 2) / TILE_SIZE) - 1;
            const endTileX = Math.ceil((player.worldX + canvas.width / 2) / TILE_SIZE) + 1;
            const startTileY = Math.floor((player.worldY - canvas.height / 2) / TILE_SIZE) - 1;
            const endTileY = Math.ceil((player.worldY + canvas.height / 2) / TILE_SIZE) + 1;

            // Dibujar las paredes tipo esquema lineal (Blueprint)
            ctx.lineWidth = 3;
            ctx.shadowBlur = 6; // Efecto de brillo/neón

            for (let ty = startTileY; ty <= endTileY; ty++) {
                for (let tx = startTileX; tx <= endTileX; tx++) {
                    const walls = getCellWalls(tx, ty);
                    
                    const screenX = tx * TILE_SIZE - player.worldX + canvas.width / 2;
                    const screenY = ty * TILE_SIZE - player.worldY + canvas.height / 2;

                    ctx.strokeStyle = getGlitchColor(tx, ty);
                    ctx.shadowColor = ctx.strokeStyle;

                    ctx.beginPath();
                    if (walls.top) {
                        ctx.moveTo(screenX, screenY);
                        ctx.lineTo(screenX + TILE_SIZE, screenY);
                    }
                    if (walls.bottom) {
                        ctx.moveTo(screenX, screenY + TILE_SIZE);
                        ctx.lineTo(screenX + TILE_SIZE, screenY + TILE_SIZE);
                    }
                    if (walls.left) {
                        ctx.moveTo(screenX, screenY);
                        ctx.lineTo(screenX, screenY + TILE_SIZE);
                    }
                    if (walls.right) {
                        ctx.moveTo(screenX + TILE_SIZE, screenY);
                        ctx.lineTo(screenX + TILE_SIZE, screenY + TILE_SIZE);
                    }
                    ctx.stroke();
                }
            }

            // Desactivar sombras pesadas para optimizar el resto
            ctx.shadowBlur = 0;

            // Dibujar punto de jugador (Color de terminal retro)
            ctx.beginPath();
            ctx.arc(player.screenX, player.screenY, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();

            // Filtro estático VHS / Glitch superpuesto
            ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
            for (let i = 0; i < 8; i++) {
                let noiseY = Math.random() * canvas.height;
                let noiseH = Math.random() * 4;
                ctx.fillRect(0, noiseY, canvas.width, noiseH);
            }

            // Línea roja horizontal errática ocasional (Interferencia de video)
            if (Math.random() < 0.15) {
                ctx.fillStyle = "rgba(255, 0, 50, 0.25)";
                ctx.fillRect(0, Math.random() * canvas.height, canvas.width, 2);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Posición de inicio inicial despejada
        player.worldX = 2 * TILE_SIZE + TILE_SIZE / 2;
        player.worldY = 2 * TILE_SIZE + TILE_SIZE / 2;

        gameLoop();
    </script>
</body>
</html>
