<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WalletFlow • FinanzasPro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
    .dark .glass { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
    .card-hover:hover { transform: translateY(-4px); transition: all 0.3s ease; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">
  <div class="max-w-md mx-auto">

    <!-- Header -->
    <header class="flex justify-between items-center p-4 border-b border-zinc-800">
      <h1 class="text-2xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">WalletFlow</h1>
      <div class="flex gap-3">
        <button onclick="toggleTheme()" class="p-2"><i class="fas fa-moon text-xl"></i></button>
        <button onclick="exportData()" class="p-2"><i class="fas fa-download"></i></button>
        <button onclick="importData()" class="p-2"><i class="fas fa-upload"></i></button>
      </div>
    </header>

    <!-- Dashboard -->
    <div class="p-4 space-y-6">
      <div class="glass rounded-3xl p-6">
        <div class="flex justify-between">
          <div>
            <p class="text-sm text-zinc-400">Patrimonio Neto</p>
            <p id="net-worth" class="text-4xl font-bold">0.00</p>
          </div>
          <div class="text-right">
            <p class="text-emerald-400 text-sm">+12.4% este mes</p>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="glass rounded-3xl p-5 card-hover">
          <p class="text-sm text-emerald-400">Ingresos</p>
          <p id="total-income" class="text-3xl font-semibold">0</p>
        </div>
        <div class="glass rounded-3xl p-5 card-hover">
          <p class="text-sm text-red-400">Gastos</p>
          <p id="total-expenses" class="text-3xl font-semibold">0</p>
        </div>
      </div>

      <!-- Add Button -->
      <button onclick="showAddModal()" 
              class="w-full bg-gradient-to-r from-emerald-500 to-cyan-500 py-4 rounded-3xl text-lg font-semibold flex items-center justify-center gap-2 shadow-lg">
        <i class="fas fa-plus"></i> Nueva Transacción
      </button>

      <!-- Recent Transactions -->
      <div>
        <div class="flex justify-between mb-3 px-1">
          <h2 class="font-semibold">Últimas Transacciones</h2>
          <button onclick="viewAll()" class="text-cyan-400 text-sm">Ver todo</button>
        </div>
        <div id="recent-transactions" class="space-y-3"></div>
      </div>
    </div>
  </div>

  <!-- Add Transaction Modal -->
  <div id="add-modal" class="hidden fixed inset-0 bg-black/80 flex items-end">
    <div class="bg-zinc-900 w-full rounded-t-3xl p-6 space-y-6 max-h-[85vh] overflow-auto">
      <h2 class="text-xl font-bold">Nueva Transacción</h2>
      <input id="amount" type="number" placeholder="Monto" class="w-full bg-zinc-800 p-4 rounded-2xl text-2xl">
      <select id="type" class="w-full bg-zinc-800 p-4 rounded-2xl">
        <option value="expense">Gasto</option>
        <option value="income">Ingreso</option>
      </select>
      <input id="category" type="text" placeholder="Categoría (ej: Comida, Salario)" class="w-full bg-zinc-800 p-4 rounded-2xl">
      <textarea id="note" placeholder="Nota (opcional)" class="w-full bg-zinc-800 p-4 rounded-2xl h-20"></textarea>
      
      <div class="flex gap-4">
        <button onclick="hideAddModal()" class="flex-1 py-4 border border-zinc-700 rounded-2xl">Cancelar</button>
        <button onclick="addTransaction()" class="flex-1 py-4 bg-emerald-500 rounded-2xl font-semibold">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
    let currency = 'USD';

    function saveData() {
      localStorage.setItem('transactions', JSON.stringify(transactions));
      renderAll();
    }

    function addTransaction() {
      const amount = parseFloat(document.getElementById('amount').value);
      if (!amount) return alert("Ingresa un monto válido");

      transactions.push({
        id: Date.now(),
        date: new Date().toISOString().split('T')[0],
        type: document.getElementById('type').value,
        amount: amount,
        category: document.getElementById('category').value || 'Otros',
        note: document.getElementById('note').value
      });

      hideAddModal();
      saveData();
    }

    function renderRecent() {
      const container = document.getElementById('recent-transactions');
      container.innerHTML = '';
      
      transactions.slice(0, 5).forEach(t => {
        const div = document.createElement('div');
        div.className = `flex justify-between items-center p-4 glass rounded-2xl`;
        div.innerHTML = `
          <div>
            <p class="font-medium">${t.category}</p>
            <p class="text-xs text-zinc-400">${t.date}</p>
          </div>
          <p class="${t.type === 'income' ? 'text-emerald-400' : 'text-red-400'} font-semibold">
            ${t.type === 'income' ? '+' : '-'}${t.amount.toFixed(2)}
          </p>
        `;
        container.appendChild(div);
      });
    }

    function calculateTotals() {
      const income = transactions.filter(t => t.type === 'income').reduce((a, b) => a + b.amount, 0);
      const expenses = transactions.filter(t => t.type === 'expense').reduce((a, b) => a + b.amount, 0);
      
      document.getElementById('total-income').textContent = income.toFixed(2);
      document.getElementById('total-expenses').textContent = expenses.toFixed(2);
      document.getElementById('net-worth').textContent = (income - expenses).toFixed(2);
    }

    function renderAll() {
      calculateTotals();
      renderRecent();
    }

    function showAddModal() {
      document.getElementById('add-modal').classList.remove('hidden');
      document.getElementById('amount').focus();
    }

    function hideAddModal() {
      document.getElementById('add-modal').classList.add('hidden');
    }

    function exportData() {
      const dataStr = JSON.stringify(transactions, null, 2);
      const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
      const exportFileDefaultName = `walletflow_backup_${new Date().toISOString().slice(0,10)}.json`;
      const linkElement = document.createElement('a');
      linkElement.setAttribute('href', dataUri);
      linkElement.setAttribute('download', exportFileDefaultName);
      linkElement.click();
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            transactions = JSON.parse(e.target.result);
            saveData();
            alert("Datos importados correctamente");
          } catch(err) {
            alert("Error al importar archivo");
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
    }

    function viewAll() {
      alert("Próximamente: Pantalla completa de transacciones");
    }

    // Inicializar
    renderAll();
  </script>
</body>
</html>
