<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlador de Voleibol - Celular</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; padding: 20px; background-color: #000; color: white;
            font-family: Arial, sans-serif; text-align: center;
            display: flex; flex-direction: column; justify-content: space-between; height: 100vh;
        }
        .status { padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .disconnected { background-color: #ff4757; }
        .connected { background-color: #2ed573; }
        input[type=range] { 
            width: 100%; height: 60px; margin: 30px 0; 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h2>Controlador Activo</h2>
        <div id="status-box" class="status disconnected">Conectando con la PC...</div>
    </header>

    <div>
        <p style="font-size: 18px; margin-bottom: 10px;">Desliza para mover las manos en la computadora:</p>
        <input type="range" id="test-slider" min="50" max="750" value="400" disabled>
    </div>

    <footer>
        <p style="color: #666;">Paso actual: Prueba de conexión remota</p>
    </footer>

    <script>
        const statusBox = document.getElementById('status-box');
        const slider = document.getElementById('test-slider');
        
        // Obtener automáticamente el código de la sala que manda el QR
        const urlParams = new URLSearchParams(window.location.search);
        const salaId = urlParams.get('sala');

        if (!salaId) {
            statusBox.innerText = "Error: No se detectó ninguna sala en el QR.";
        } else {
            // Conectar con el servidor PeerJS
            const peer = new Peer();

            peer.on('open', () => {
                // Enlazarse a la PC
                const conn = peer.connect(salaId);

                conn.on('open', () => {
                    statusBox.innerText = "¡CONECTADO CON ÉXITO!";
                    statusBox.className = "status connected";
                    slider.disabled = false; // Activamos el slider

                    // Enviar los datos cada vez que el usuario mueva el slider
                    slider.addEventListener('input', (e) => {
                        conn.send({
                            tipo: 'movimiento',
                            x: parseInt(e.target.value)
                        });
                    });
                });

                conn.on('close', () => {
                    statusBox.innerText = "Conexión terminada.";
                    statusBox.className = "status disconnected";
                    slider.disabled = true;
                });
            });
        }
    </script>
</body>
</html>
