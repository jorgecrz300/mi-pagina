<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlador de Voleibol - Cliente Móvil</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; padding: 20px; background-color: #000; color: white;
            font-family: Arial, sans-serif; text-align: center;
            display: flex; flex-direction: column; justify-content: space-between; height: 100vh;
        }
        .status { padding: 10px; border-radius: 5px; font-weight: bold; }
        .disconnected { background-color: #ff4757; }
        .connected { background-color: #2ed573; }
        input[type=range] { width: 100%; height: 50px; margin: 20px 0; }
    </style>
</head>
<body>

    <header>
        <h2>Controlador de Voleibol</h2>
        <div id="status-box" class="status disconnected">Conectando con la PC...</div>
    </header>

    <div>
        <p>Prueba mover este control para ver si las manos se mueven en la PC:</p>
        <input type="range" id="test-slider" min="50" max="750" value="400 disabled">
    </div>

    <footer>
        <p>Próximo paso: Activar seguimiento de manos por cámara.</p>
    </footer>

    <script>
        const statusBox = document.getElementById('status-box');
        const slider = document.getElementById('test-slider');
        
        // Obtener la ID de la computadora desde la URL (?sala=voley-pc-XXXX)
        const urlParams = new URLSearchParams(window.location.search);
        const salaId = urlParams.get('sala');

        if (!salaId) {
            statusBox.innerText = "Error: Falta el código de la sala.";
        } else {
            // Inicializar PeerJS para el teléfono
            const peer = new Peer();

            peer.on('open', () => {
                // Conectarse a la computadora usando su ID
                const conn = peer.connect(salaId);

                conn.on('open', () => {
                    statusBox.innerText = "¡CONECTADO A LA PC!";
                    statusBox.className = "status connected";
                    slider.disabled = false; // Habilitar slider

                    // Cada vez que muevas el slider del teléfono, enviamos la posición X a la PC
                    slider.addEventListener('input', (e) => {
                        conn.send({
                            tipo: 'movimiento',
                            x: parseInt(e.target.value)
                        });
                    });
                });

                conn.on('close', () => {
                    statusBox.innerText = "Conexión perdida.";
                    statusBox.className = "status disconnected";
                });
            });
        }
    </script>
</body>
</html>
