<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FinanzasPro">
    
    <title>FinanzasPro V2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* --- CONFIGURACIÓN DE LOS TEMAS (VARIABLES CSS) --- */
        
        /* 1. Tema Predeterminado (Modo Oscuro Cyberpunk) */
        :root[data-theme="cyberpunk"] {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --text-color: #f8fafc;
            --primary: #a855f7; /* Morado Neón */
            --success: #22c55e; /* Verde */
            --danger: #ef4444;  /* Rojo */
            --border: #22314d;
            --input-bg: #0b0f19;
        }

        /* 2. Tema Claro Minimalista */
        :root[data-theme="light"] {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --primary: #4361ee; /* Azul Pro */
            --success: #2ec4b6; /* Turquesa */
            --danger: #e63946;  /* Coral */
            --border: #e9ecef;
            --input-bg: #ffffff;
        }

        /* 3. Tema Espacial / Galaxia */
        :root[data-theme="space"] {
            --bg-color: #0d1b2a;
            --card-bg: #1b263b;
            --text-color: #e0e1dd;
            --primary: #e0a96d; /* Oro / Dorado */
            --success: #52b788; /* Verde esmeralda */
            --danger: #f26419;  /* Naranja brillante */
            --border: #415a77;
            --input-bg: #0d1b2a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #app-screen { width: 100%; max-width: 500px; padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px; }
        
        /* Header con Selector de Temas */
        header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        header h1 { margin: 0; font-size: 22px; color: var(--primary); font-weight: 800; }
        
        .theme-selector {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-color);
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        /* Cuadros Numéricos */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .card { background: var(--card-bg); padding: 12px 8px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .card h3 { margin: 0 0 4px 0; font-size: 10px; text-transform: uppercase; color: #868e96; }
        .card p { margin: 0; font-size: 14px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; }
        
        .main-content { display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }
        .panel { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .panel h2 { margin-top: 0; margin-bottom: 15px; font-size: 16px; font-weight: 700; }
        
        /* Formulario */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; }
        .form-group input, .form-group select { width: 100%; height: 46px; padding: 0 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; background-color: var(--input-bg); color: var(--text-color); }
        
        button.btn-submit { width: 100%; height: 48px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        /* Lista Historial */
        .transaction-list { list-style: none; padding: 0; margin: 0; }
        .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); }
        .item-details { display: flex; flex-direction: column; max-width: 65%; }
        .item-details strong { font-size: 15px; overflow: hidden; text-overflow: ellipsis; }
        .item-category { font-size: 11px; color: #868e96; }
        .item-amount { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 12px; }
        
        .btn-delete { background: var(--bg-color); border: none; color: #adb5bd; border-radius: 50%; width: 32px; height: 32px; font-size: 12px; cursor: pointer; }
        .chart-container { position: relative; height: 200px; width: 100%; }

        @media (min-width: 769px) {
            body { align-items: flex-start; padding-top: 40px; }
            #app-screen { max-width: 900px; }
            .card p { font-size: 22px; }
            .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        }
    </style>
</head>
<body>

    <div id="app-screen">
        <header>
            <h1>FinanzasPro</h1>
            <select id="theme-select" class="theme-selector">
                <option value="cyberpunk">🌑 Cyberpunk</option>
                <option value="light">☀️ Claro Min</option>
                <option value="space">🌌 Espacial</option>
            </select>
        </header>

        <div class="dashboard">
            <div class="card"><h3>Balance</h3><p id="total-balance" style="color:var(--primary);">$0</p></div>
            <div class="card"><h3>Ingresos</h3><p id="total-income" style="color:var(--success);">$0</p></div>
            <div class="card"><h3>Gastos</h3><p id="total-expense" style="color:var(--danger);">$0</p></div>
        </div>

        <div class="main-content">
            <div class="panel">
                <h2>Nuevo Movimiento</h2>
                <form id="transaction-form">
                    <div class="form-group">
                        <label>Descripción</label>
                        <input type="text" id="description" placeholder="Ej. Almuerzo, PlayStation" required>
                    </div>
                    <div class="form-group">
                        <label>Monto ($)</label>
                        <input type="number" id="amount" step="0.01" inputmode="decimal" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Tipo</label>
                        <select id="type">
                            <option value="expense">Gasto</option>
                            <option value="income">Ingreso</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="category">
                            <option value="Comida">Comida</option>
                            <option value="Vivienda">Vivienda</option>
                            <option value="Transporte">Transporte</option>
                            <option value="Entretenimiento">Entretenimiento</option>
                            <option value="Otros">Otros</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-submit">Guardar Movimiento</button>
                </form>
            </div>

            <div class="panel">
                <h2>Distribución</h2>
                <div class="chart-container"><canvas id="expenseChart"></canvas></div>
            </div>

            <div class="panel">
                <h2>Historial Local</h2>
                <ul id="transaction-list" class="transaction-list"></ul>
            </div>
        </div>
    </div>

    <script>
        // --- LOGICA DE ALMACENAMIENTO LOCAL ---
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let myChart;

        // --- SISTEMA DEL SELECTOR DE TEMAS ---
        const themeSelect = document.getElementById('theme-select');
        
        // Al cargar la app, busca si ya había un tema guardado en el celular
        const savedTheme = localStorage.getItem('app-theme') || 'cyberpunk';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeSelect.value = savedTheme;

        // Escucha cuándo cambias de tema en el menú desplegable
        themeSelect.addEventListener('change', (e) => {
            const selectedTheme = e.target.value;
            document.documentElement.setAttribute('data-theme', selectedTheme); // Cambia el diseño visual
            localStorage.setItem('app-theme', selectedTheme); // Lo guarda para siempre
            updateUI(); // Redibuja los gráficos con los nuevos colores
        });

        // Formulario Guardar
        document.getElementById('transaction-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const desc = document.getElementById('description').value;
            const amt = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('type').value;
            const cat = document.getElementById('category').value;

            transactions.push({ id: Date.now(), description: desc, amount: amt, type: type, category: cat });
            localStorage.setItem('transactions', JSON.stringify(transactions));
            
            document.getElementById('description').value = '';
            document.getElementById('amount').value = '';
            document.activeElement.blur();
            updateUI();
        });

        // Eliminar
        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            updateUI();
        }

        // Renderizado Completo e Integración Matemático-Visual
        function updateUI() {
            const amounts = transactions.map(t => t.type === 'income' ? t.amount : -t.amount);
            const total = amounts.reduce((acc, item) => (acc += item), 0);
            const income = transactions.filter(t => t.type === 'income').reduce((acc, t) => acc + t.amount, 0);
            const expense = transactions.filter(t => t.type === 'expense').reduce((acc, t) => acc + t.amount, 0);

            const format = num => '$' + num.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,').replace('.00', '');
            
            document.getElementById('total-balance').innerText = format(total);
            document.getElementById('total-income').innerText = format(income);
            document.getElementById('total-expense').innerText = format(expense);

            // Alerta de números rojos (ajustado según el tema mediante variables CSS)
            document.getElementById('total-balance').style.color = total < 0 ? 'var(--danger)' : 'var(--primary)';

            const listEl = document.getElementById('transaction-list');
            listEl.innerHTML = '';
            
            if(transactions.length === 0) {
                listEl.innerHTML = '<li style="text-align:center;color:#868e96;padding:20px;font-size:14px;">Lista vacía</li>';
            } else {
                // Muestra los más nuevos arriba (.reverse())
                [...transactions].reverse().forEach(t => {
                    const li = document.createElement('li');
                    li.className = 'transaction-item';
                    const sign = t.type === 'income' ? '+' : '-';
                    const cls = t.type === 'income' ? 'color:var(--success)' : 'color:var(--danger)';
                    li.innerHTML = `
                        <div class="item-details"><strong>${t.description}</strong><span class="item-category">${t.category}</span></div>
                        <div class="item-amount" style="${cls}">${sign}${format(t.amount)}
                        <button class="btn-delete" onclick="deleteTransaction(${t.id})">✕</button></div>
                    `;
                    listEl.appendChild(li);
                });
            }

            // --- CONFIGURACIÓN DE COLORES DE LA GRÁFICA SEGÚN EL TEMA ACTIVO ---
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let chartColors = [];
            let textChartColor = '#fff';

            if(currentTheme === 'light') {
                chartColors = ['#ff6b6b', '#4cc9f0', '#f77f00', '#4cc1a1', '#7209b7'];
                textChartColor = '#212529';
            } else if(currentTheme === 'space') {
                chartColors = ['#f26419', '#e0a96d', '#84a59d', '#f72585', '#7209b7'];
                textChartColor = '#e0e1dd';
            } else { // Cyberpunk
                chartColors = ['#a855f7', '#22c55e', '#3b82f6', '#eab308', '#ec4899'];
                textChartColor = '#f8fafc';
            }

            const categories = ['Comida', 'Vivienda', 'Transporte', 'Entretenimiento', 'Otros'];
            const dataValues = categories.map(cat => transactions.filter(t => t.type === 'expense' && t.category === cat).reduce((acc, t) => acc + t.amount, 0));
            
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: categories, datasets: [{ data: dataValues, backgroundColor: chartColors, borderWidth: 1, borderColor: 'var(--card-bg)' }] },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { 
                            position: 'bottom', 
                            labels: { boxWidth: 10, font: { size: 11 }, color: textChartColor } 
                        } 
                    } 
                }
            });
        }

        // Iniciar la app al cargar
        updateUI();
    </script>
</body>
</html>
