<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FinanzasPro V3 - Full</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- VARIABLES DE TEMAS --- */
        :root[data-theme="cyberpunk"] {
            --bg-color: #0b0f19; --card-bg: #151f32; --text-color: #f8fafc;
            --primary: #a855f7; --success: #22c55e; --danger: #ef4444; --border: #22314d;
        }
        :root[data-theme="light"] {
            --bg-color: #f8f9fa; --card-bg: #ffffff; --text-color: #212529;
            --primary: #4361ee; --success: #2ec4b6; --danger: #e63946; --border: #e9ecef;
        }
        :root[data-theme="space"] {
            --bg-color: #0d1b2a; --card-bg: #1b263b; --text-color: #e0e1dd;
            --primary: #e0a96d; --success: #52b788; --danger: #f26419; --border: #415a77;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; overflow-x: hidden;
        }

        /* --- BARRA DE NAVEGACIÓN SUPERIOR --- */
        .navbar {
            height: 60px; background: var(--card-bg); display: flex; align-items: center;
            padding: 0 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .menu-btn { font-size: 24px; cursor: pointer; color: var(--primary); background: none; border: none; }
        .nav-title { margin-left: 20px; font-weight: 800; font-size: 18px; }

        /* --- MENÚ LATERAL (SIDEBAR) --- */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--card-bg); z-index: 200; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            padding: 40px 20px; display: flex; flex-direction: column; gap: 20px;
        }
        .sidebar.active { left: 0; }
        .sidebar-item {
            padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px;
            text-decoration: none; color: var(--text-color); font-weight: 600; cursor: pointer;
        }
        .sidebar-item:hover { background: var(--bg-color); color: var(--primary); }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 150;
        }
        .overlay.active { display: block; }

        /* --- CONTENEDOR DE PANTALLAS --- */
        .screen { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- DISEÑO DE CALENDARIO --- */
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;
            background: var(--card-bg); padding: 15px; border-radius: 16px; border: 1px solid var(--border);
        }
        .cal-day-name { text-align: center; font-size: 10px; font-weight: bold; color: var(--primary); padding-bottom: 10px; }
        .cal-day {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-size: 14px; position: relative; cursor: pointer;
        }
        .cal-day:hover { background: var(--border); }
        .cal-day.today { border: 2px solid var(--primary); font-weight: bold; }
        .cal-day.has-data::after {
            content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px;
            background: var(--success); border-radius: 50%;
        }
        .cal-day.selected { background: var(--primary); color: white; }

        /* --- CARDS Y PANELES --- */
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .num { font-size: 24px; font-weight: 800; }
        .label { font-size: 12px; color: #868e96; text-transform: uppercase; }

        /* --- LISTAS --- */
        .list { list-style: none; padding: 0; margin: 0; }
        .item {
            display: flex; justify-content: space-between; padding: 15px 0;
            border-bottom: 1px solid var(--border); align-items: center;
        }
        .item:last-child { border-bottom: none; }

        /* --- FORMULARIOS --- */
        input, select, button {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg-color); color: var(--text-color); margin-top: 5px; font-size: 16px;
        }
        button { background: var(--primary); color: white; border: none; font-weight: bold; margin-top: 15px; }

        .chart-box { height: 250px; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h2 style="color:var(--primary)">FinanzasPro</h2>
        <div class="sidebar-item" onclick="showScreen('home')"><i class="fa-solid fa-house"></i> Home</div>
        <div class="sidebar-item" onclick="showScreen('calendar')"><i class="fa-solid fa-calendar"></i> Calendario</div>
        <div class="sidebar-item" onclick="showScreen('settings')"><i class="fa-solid fa-gear"></i> Settings</div>
    </div>

    <nav class="navbar">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <span class="nav-title" id="screen-title">Home</span>
    </nav>

    <div id="home" class="screen active">
        <div class="card">
            <span class="label">Balance Total</span>
            <div class="num" id="h-balance">$0.00</div>
        </div>
        <div class="balance-grid">
            <div class="card"><span class="label">Ingresos</span><div class="num" id="h-income" style="color:var(--success)">$0</div></div>
            <div class="card"><span class="label">Gastos</span><div class="num" id="h-expense" style="color:var(--danger)">$0</div></div>
        </div>
        
        <div class="card">
            <h2>Nuevo Registro</h2>
            <form id="trans-form">
                <input type="text" id="desc" placeholder="¿Qué compraste?" required>
                <input type="number" id="amt" step="0.01" placeholder="Monto" required>
                <select id="type">
                    <option value="expense">Gasto</option>
                    <option value="income">Ingreso</option>
                </select>
                <select id="cat">
                    <option value="Comida">Comida</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Entretenimiento">Entretenimiento</option>
                    <option value="Otros">Otros</option>
                </select>
                <button type="submit">Guardar</button>
            </form>
        </div>
    </div>

    <div id="calendar" class="screen">
        <div class="card">
            <h2 id="month-name" style="margin-top:0">Mayo 2024</h2>
            <div class="calendar-grid" id="calendar-grid">
                </div>
        </div>

        <div id="day-detail-panel" style="display: none;">
            <div class="card">
                <h2 id="selected-date-text">Detalle del día</h2>
                <div class="chart-box">
                    <canvas id="dayBarChart"></canvas>
                </div>
            </div>
            <div class="card">
                <h3>Movimientos del día</h3>
                <ul class="list" id="day-list"></ul>
            </div>
        </div>
    </div>

    <div id="settings" class="screen">
        <div class="card">
            <h2>Personalización</h2>
            <label class="label">Seleccionar Tema</label>
            <select id="theme-select" style="margin-top:10px">
                <option value="cyberpunk">🌑 Cyberpunk</option>
                <option value="light">☀️ Claro Minimal</option>
                <option value="space">🌌 Espacial</option>
            </select>
        </div>
        <div class="card">
            <h2>Datos</h2>
            <p style="font-size:12px">Esto borrará todos tus registros del teléfono.</p>
            <button onclick="resetData()" style="background:var(--danger)">Borrar todo</button>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS LOCAL ---
        let transactions = JSON.parse(localStorage.getItem('fpro_v3_data')) || [];
        let currentScreen = 'home';
        let barChart = null;

        // --- NAVEGACIÓN ---
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.getElementById('screen-title').innerText = screenId.toUpperCase();
            toggleMenu();
            if(screenId === 'calendar') renderCalendar();
            updateHome();
        }

        // --- LÓGICA DE HOME ---
        document.getElementById('trans-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const date = new Date();
            const dateStr = date.toISOString().split('T')[0]; // Formato YYYY-MM-DD

            const t = {
                id: Date.now(),
                desc: document.getElementById('desc').value,
                amt: parseFloat(document.getElementById('amt').value),
                type: document.getElementById('type').value,
                cat: document.getElementById('cat').value,
                date: dateStr
            };

            transactions.push(t);
            localStorage.setItem('fpro_v3_data', JSON.stringify(transactions));
            e.target.reset();
            updateHome();
            alert("¡Guardado!");
        });

        function updateHome() {
            const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amt, 0);
            const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amt, 0);
            const balance = income - expense;

            document.getElementById('h-balance').innerText = `$${balance.toFixed(2)}`;
            document.getElementById('h-income').innerText = `$${income.toFixed(2)}`;
            document.getElementById('h-expense').innerText = `$${expense.toFixed(2)}`;
        }

        // --- LÓGICA DE CALENDARIO ---
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            
            const monthNames = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
            document.getElementById('month-name').innerText = `${monthNames[month]} ${year}`;

            // Cabecera días
            ['D','L','M','M','J','V','S'].forEach(d => {
                grid.innerHTML += `<div class="cal-day-name">${d}</div>`;
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Espacios vacíos
            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;

            // Días del mes
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hasData = transactions.some(t => t.date === dateStr);
                const isToday = d === now.getDate() ? 'today' : '';
                const dataClass = hasData ? 'has-data' : '';

                const dayEl = document.createElement('div');
                dayEl.className = `cal-day ${isToday} ${dataClass}`;
                dayEl.innerText = d;
                dayEl.onclick = () => selectDay(dateStr, dayEl);
                grid.appendChild(dayEl);
            }
        }

        function selectDay(dateStr, el) {
            document.querySelectorAll('.cal-day').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');

            const dayTrans = transactions.filter(t => t.date === dateStr);
            document.getElementById('day-detail-panel').style.display = 'block';
            document.getElementById('selected-date-text').innerText = `Día: ${dateStr}`;

            // Listado
            const listEl = document.getElementById('day-list');
            listEl.innerHTML = dayTrans.length ? '' : '<li>Sin gastos hoy</li>';
            dayTrans.forEach(t => {
                const sign = t.type === 'income' ? '+' : '-';
                const color = t.type === 'income' ? 'var(--success)' : 'var(--danger)';
                listEl.innerHTML += `<li class="item"><span>${t.desc} (${t.cat})</span> <b style="color:${color}">${sign}$${t.amt}</b></li>`;
            });

            // Gráfica de Barras
            updateBarChart(dayTrans);
        }

        function updateBarChart(dayData) {
            const categories = ["Comida", "Transporte", "Entretenimiento", "Otros"];
            const dataValues = categories.map(cat => {
                return dayData.filter(t => t.cat === cat && t.type === 'expense').reduce((s, t) => s + t.amt, 0);
            });

            const ctx = document.getElementById('dayBarChart').getContext('2d');
            if(barChart) barChart.destroy();

            barChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: categories,
                    datasets: [{
                        label: 'Gastos del día',
                        data: dataValues,
                        backgroundColor: ['#a855f7', '#3b82f6', '#22c55e', '#eab308']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: '#333' } } }
                }
            });
        }

        // --- CONFIGURACIÓN ---
        document.getElementById('theme-select').addEventListener('change', (e) => {
            document.documentElement.setAttribute('data-theme', e.target.value);
            localStorage.setItem('fpro_theme', e.target.value);
        });

        function resetData() {
            if(confirm("¿Estás seguro? Se borrará TODO.")) {
                localStorage.clear();
                location.reload();
            }
        }

        // --- INICIO ---
        const savedTheme = localStorage.getItem('fpro_theme') || 'cyberpunk';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-select').value = savedTheme;
        updateHome();
    </script>
</body>
</html>
