<!DOCTYPE html>
<html lang="es" data-theme="cyberpunk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FinanzasPro">
    
    <title>FinanzasPro V15.0 - AI Financial Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- VARIABLES DE TEMAS EXPANDIDAS Y MEJORADAS --- */
        :root[data-theme="cyberpunk"] {
            --bg-color: #0b0f19; --card-bg: #151f32; --text-color: #f8fafc;
            --primary: #a855f7; --success: #22c55e; --danger: #ef4444; --border: #22314d; --input-bg: #0b0f19;
            --glass-bg: rgba(21, 31, 50, 0.7); --glass-border: rgba(255, 255, 255, 0.04);
        }
        :root[data-theme="glass"] {
            --bg-color: #090d16; --card-bg: rgba(255, 255, 255, 0.03); --text-color: #f1f5f9;
            --primary: #38bdf8; --success: #34d399; --danger: #fb7185; --border: rgba(255, 255, 255, 0.08); --input-bg: rgba(0, 0, 0, 0.2);
            --glass-bg: rgba(15, 23, 42, 0.4); --glass-border: rgba(255, 255, 255, 0.08);
        }
        :root[data-theme="space"] {
            --bg-color: #05050a; --card-bg: #0b111e; --text-color: #e2e8f0;
            --primary: #6366f1; --success: #059669; --danger: #dc2626; --border: #1e293b; --input-bg: #020205;
            --glass-bg: rgba(11, 17, 30, 0.8); --glass-border: rgba(99, 102, 241, 0.1);
        }
        :root[data-theme="minimal"] {
            --bg-color: #f8fafc; --card-bg: #ffffff; --text-color: #0f172a;
            --primary: #0f172a; --success: #16a34a; --danger: #dc2626; --border: #e2e8f0; --input-bg: #f1f5f9;
            --glass-bg: rgba(255, 255, 255, 0.8); --glass-border: rgba(0, 0, 0, 0.05);
        }
        :root[data-theme="emerald"] {
            --bg-color: #061c15; --card-bg: #0b2d23; --text-color: #ecfdf5;
            --primary: #10b981; --success: #34d399; --danger: #f43f5e; --border: #114737; --input-bg: #04120e;
            --glass-bg: rgba(11, 45, 35, 0.8); --glass-border: rgba(16, 185, 129, 0.15);
        }
        :root[data-theme="sakura"] {
            --bg-color: #261219; --card-bg: #3b1d28; --text-color: #fff1f2;
            --primary: #f472b6; --success: #4ade80; --danger: #fb7185; --border: #5c2e3f; --input-bg: #1c0c12;
            --glass-bg: rgba(59, 29, 40, 0.8); --glass-border: rgba(244, 114, 182, 0.15);
        }

        /* --- ESTILOS BASE COMPATIBLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.3s, color 0.3s; padding-bottom: 20px; }
        
        .header { display: flex; justify-content: space-between; items-center; padding: 15px; background: var(--glass-bg); border-bottom: 1px solid var(--glass-border); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .logo-section { display: flex; items-center; gap: 10px; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), #3b82f6); border-radius: 8px; display: flex; items-center; justify-content: center; color: white; font-weight: bold; }
        .logo-title { font-size: 18px; font-weight: 800; }
        .header-actions { display: flex; items-center; gap: 10px; }
        
        .nav-tabs { display: flex; justify-content: space-around; background: var(--card-bg); margin: 15px; padding: 5px; border-radius: 12px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 10px; text-align: center; background: none; border: none; color: var(--text-color); opacity: 0.6; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
        .tab-btn.active { opacity: 1; background: var(--primary); color: white; }

        .container { padding: 0 15px; }
        .panel { display: none; }
        .panel.active { display: block; }
        
        .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 15px; }
        .card-title { font-size: 14px; font-weight: 700; text-transform: uppercase; tracking: 0.5px; opacity: 0.8; margin-bottom: 15px; display: flex; items-center; gap: 8px; }
        
        /* --- KPI BLOCK --- */
        .kpi-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
        @media(min-width: 600px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
        .kpi-box { padding: 12px; background: rgba(0,0,0,0.1); border-radius: 10px; border: 1px solid var(--border); }
        .kpi-label { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
        .kpi-value { font-size: 18px; font-weight: 700; }
        .kpi-value.up { color: var(--success); }
        .kpi-value.down { color: var(--danger); }

        /* --- FORM CONTROL --- */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 5px; opacity: 0.7; }
        .form-control { w-full: 100%; width: 100%; padding: 10px; background-color: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text-color); font-size: 13px; outline: none; }
        .form-control:focus { border-color: var(--primary); }
        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }
        
        .btn { width: 100%; padding: 12px; background-color: var(--primary); border: none; border-radius: 10px; color: white; font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity 0.2s; }
        .btn:opacity { opacity: 0.9; }
        
        /* --- CONTENEDORES Y LISTAS --- */
        .ledger-list { list-style: none; max-height: 300px; overflow-y: auto; }
        .ledger-item { display: flex; justify-content: space-between; items-center; padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .ledger-item:last-child { border-bottom: none; }
        
        .budget-bar-group { margin-bottom: 12px; }
        .budget-bar-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
        .budget-bar-track { height: 8px; background: rgba(0,0,0,0.2); border-radius: 4px; overflow: hidden; }
        .budget-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s; }
        .budget-bar-fill.warning { background: var(--danger); }

        /* --- CHATROOM SUITE --- */
        .chatroom { height: 350px; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.1); border-radius: 12px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 13px; line-height: 1.4; }
        .msg.bot { background: var(--border); align-self: flex-start; border-top-left-radius: 0; }
        .msg.user { background: var(--primary); color: white; align-self: flex-end; border-top-right-radius: 0; }
        
        /* --- MENÚ DESPLEGABLE DE CONFIGURACIÓN --- */
        .dropdown-menu { display: none; position: absolute; top: 55px; right: 15px; background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 12px; width: 220px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; }
        .dropdown-menu.active { display: block; }
        .dropdown-item { margin-bottom: 12px; }
        .dropdown-item:last-child { margin-bottom: 0; }
        
        .chart-container { position: relative; height: 180px; width: 100%; }
        .select-icon-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-color); width: 32px; height: 32px; border-radius: 8px; display: flex; items-center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-section">
            <div class="logo-icon"><i class="fa-solid fa-brain"></i></div>
            <div class="logo-title">FinanzasPro</div>
        </div>
        <div class="header-actions">
            <select id="currencySelector" onchange="changeCurrency()" style="background: var(--card-bg); border: 1px solid var(--border); color: var(--text-color); padding: 5px; border-radius: 6px; font-size: 12px; font-weight: bold;">
                <option value="USD">$ USD</option>
                <option value="EUR">€ EUR</option>
                <option value="MXN">$ MXN</option>
            </select>
            <button class="select-icon-btn" id="btn-config" onclick="toggleConfigMenu(event)">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </header>

    <div class="dropdown-menu" id="configMenu">
        <div class="dropdown-item">
            <label style="display:block; font-size:10px; font-weight:bold; margin-bottom:5px; opacity:0.7; text-transform:uppercase;">Idioma / Language</label>
            <select id="langSelector" onchange="changeLanguage()" class="form-control" style="padding:5px;">
                <option value="es">Español</option>
                <option value="en">English</option>
            </select>
        </div>
        <div class="dropdown-item">
            <label style="display:block; font-size:10px; font-weight:bold; margin-bottom:5px; opacity:0.7; text-transform:uppercase;">Tema Estético</label>
            <select id="themeSelector" onchange="changeTheme(this.value)" class="form-control" style="padding:5px;">
                <option value="cyberpunk">🌃 Cyberpunk</option>
                <option value="glass">💎 Glassmorphism</option>
                <option value="space">🌌 Cosmos</option>
                <option value="minimal">⚪ Minimalist</option>
                <option value="emerald">🍏 Emerald Mint</option>
                <option value="sakura">🌸 Sakura Retro</option>
            </select>
        </div>
        <hr style="border:none; border-top:1px solid var(--border); margin:10px 0;">
        <button onclick="clearData()" style="width:100%; background:var(--danger); color:white; border:none; padding:6px; font-size:11px; font-weight:bold; border-radius:6px; cursor:pointer;">Reiniciar Datos</button>
    </div>

    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('overview', this)" id="nav-overview">Resumen</button>
        <button class="tab-btn" onclick="switchTab('analytics', this)" id="nav-analytics">Presupuestos</button>
        <button class="tab-btn" onclick="switchTab('chat', this)" id="nav-chat">Asistente IA</button>
    </nav>

    <main class="container">

        <div id="panel-overview" class="panel active">
            <div class="card">
                <div class="card-title" id="title-balance">⚡ Balance General</div>
                <div class="kpi-grid">
                    <div class="kpi-box">
                        <div class="kpi-label" id="lbl-net">Patrimonio Neto</div>
                        <div class="kpi-value" id="val-net">$0.00</div>
                    </div>
                    <div class="kpi-box">
                        <div class="kpi-label" id="lbl-inc">Ingresos Totales</div>
                        <div class="kpi-value up" id="val-inc">$0.00</div>
                    </div>
                    <div class="kpi-box">
                        <div class="kpi-label" id="lbl-exp">Gastos Totales</div>
                        <div class="kpi-value down" id="val-exp">$0.00</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title" id="title-add">📝 Añadir Flujo</div>
                <form id="txForm" onsubmit="addTransaction(event)">
                    <div class="form-group">
                        <label id="lbl-desc">Descripción</label>
                        <input type="text" id="txDesc" class="form-control" placeholder="Ej. Almuerzo, Salario" required>
                    </div>
                    <div class="row">
                        <div class="form-group">
                            <label id="lbl-cat">Categoría</label>
                            <select id="txCat" class="form-control">
                                <option value="Ingreso">Ingreso</option>
                                <option value="Comida">Comida</option>
                                <option value="Transporte">Transporte</option>
                                <option value="Ocio">Ocio</option>
                                <option value="Otros">Otros</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label id="lbl-amount">Monto</label>
                            <input type="number" step="0.01" id="txAmount" class="form-control" placeholder="0.00" required>
                        </div>
                    </div>
                    <button type="submit" class="btn" id="btn-save">Registrar Movimiento</button>
                </form>
            </div>

            <div class="card">
                <div class="card-title" id="title-history">📋 Historial de Cuentas</div>
                <ul class="ledger-list" id="ledgerContainer"></ul>
            </div>
        </div>

        <div id="panel-analytics" class="panel">
            <div class="card">
                <div class="card-title" id="title-limits">📊 Límites Mensuales</div>
                <div id="budgetBarsContainer"></div>
            </div>
            <div class="card">
                <div class="card-title" id="title-distribution">🍕 Distribución</div>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>

        <div id="panel-chat" class="panel">
            <div class="card" style="margin-bottom:0;">
                <div class="card-title"><i class="fa-solid fa-robot"></i> AI Financial Chat Suite</div>
                <div class="chatroom" id="chatroomContainer"></div>
                
                <div style="position: relative; margin-bottom: 8px;">
                    <button id="btn-comandos" onclick="toggleMenuComandos(event)" style="background: var(--border); color: var(--text-color); border: none; padding: 6px 12px; font-size: 11px; font-weight: bold; border-radius: 6px; cursor: pointer;">
                        ⚡ Comandos Rápidos
                    </button>
                    <div id="menu-comandos" style="display: none; position: absolute; bottom: 100%; left: 0; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; width: 240px; padding: 6px; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); z-index: 10;">
                        <button onclick="ejecutarComando('¿Cómo voy con mi regla 50/30/20 este mes?')" style="width: 100%; text-align: left; padding: 6px; background: none; border: none; color: var(--text-color); font-size: 11px; cursor: pointer; border-radius: 4px;">📈 Diagnóstico 50/30/20</button>
                        <button onclick="ejecutarComando('¿He superado algún tope de presupuesto?')" style="width: 100%; text-align: left; padding: 6px; background: none; border: none; color: var(--text-color); font-size: 11px; cursor: pointer; border-radius: 4px;">⚠️ Alertas de Presupuesto</button>
                        <button onclick="ejecutarComando('Dame un consejo rápido para optimizar mis gastos fijos')" style="width: 100%; text-align: left; padding: 6px; background: none; border: none; color: var(--text-color); font-size: 11px; cursor: pointer; border-radius: 4px;">💡 Tips de Ahorro</button>
                    </div>
                </div>

                <div class="row">
                    <input type="text" id="ai-chat-input" class="form-control" placeholder="Pregunta algo sobre tu dinero..." style="flex:4;">
                    <button class="btn" onclick="sendChatMessage()" style="flex:1; padding:0;">Enviar</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        let transactions = JSON.parse(localStorage.getItem('fpro_txs')) || [];
        let limits = { Comida: 300, Transporte: 150, Ocio: 200, Otros: 250 };
        let currentCurrency = 'USD';
        let currentLang = 'es';
        let pieChartInstance = null;

        const langStrings = {
            es: {
                net: "Patrimonio Neto", inc: "Ingresos Totales", exp: "Gastos Totales",
                desc: "Descripción", cat: "Categoría", amount: "Monto",
                save: "Registrar Movimiento", titleBal: "⚡ Balance General",
                titleAdd: "📝 Añadir Flujo", titleHist: "📋 Historial de Cuentas",
                titleLim: "📊 Límites Mensuales", titleDist: "🍕 Distribución",
                botWelcome: "¡Hola! Soy tu asistente de Inteligencia Artificial. Puedo auditar el cumplimiento de tus presupuestos o darte recomendaciones de ahorro eficientes.",
                nav1: "Resumen", nav2: "Presupuestos", nav3: "Asistente IA"
            },
            en: {
                net: "Net Wealth", inc: "Total Income", exp: "Total Expenses",
                desc: "Description", cat: "Category", amount: "Amount",
                save: "Record Transaction", titleBal: "⚡ Financial Balance",
                titleAdd: "📝 Add Ledger Entry", titleHist: "📋 Ledger History",
                titleLim: "📊 Monthly Limits", titleDist: "🍕 Distribution Allocation",
                botWelcome: "Hello! I am your AI assistant. I can audit your budget compliance or provide efficient savings recommendations.",
                nav1: "Overview", nav2: "Budgets", nav3: "AI Chatbot"
            }
        };

        function toggleConfigMenu(e) {
            e.stopPropagation();
            document.getElementById('configMenu').classList.toggle('active');
        }

        document.addEventListener('click', () => {
            document.getElementById('configMenu').classList.remove('active');
        });

        function changeTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('fpro_theme', theme);
            if(pieChartInstance) updateChart();
        }

        function changeCurrency() {
            currentCurrency = document.getElementById('currencySelector').value;
            updateUI();
        }

        function changeLanguage() {
            currentLang = document.getElementById('langSelector').value;
            applyLanguageStrings();
        }

        function applyLanguageStrings() {
            const s = langStrings[currentLang];
            document.getElementById('lbl-net').innerText = s.net;
            document.getElementById('lbl-inc').innerText = s.inc;
            document.getElementById('lbl-exp').innerText = s.exp;
            document.getElementById('lbl-desc').innerText = s.desc;
            document.getElementById('lbl-cat').innerText = s.cat;
            document.getElementById('lbl-amount').innerText = s.amount;
            document.getElementById('btn-save').innerText = s.save;
            document.getElementById('title-balance').innerText = s.titleBal;
            document.getElementById('title-add').innerText = s.titleAdd;
            document.getElementById('title-history').innerText = s.titleHist;
            document.getElementById('title-limits').innerText = s.titleLim;
            document.getElementById('title-distribution').innerText = s.titleDist;
            document.getElementById('nav-overview').innerText = s.nav1;
            document.getElementById('nav-analytics').innerText = s.nav2;
            document.getElementById('nav-chat').innerText = s.nav3;
        }

        function switchTab(panelId, btn) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`panel-${panelId}`).classList.add('active');
            btn.classList.add('active');
            if(panelId === 'analytics') setTimeout(updateChart, 50);
        }

        function formatMoney(amount) {
            const symbols = { USD: '$', EUR: '€', MXN: '$' };
            return `${symbols[currentCurrency]}${Math.abs(amount).toFixed(2)}`;
        }

        function addTransaction(e) {
            e.preventDefault();
            const desc = document.getElementById('txDesc').value;
            const cat = document.getElementById('txCat').value;
            const amount = parseFloat(document.getElementById('txAmount').value);
            
            transactions.unshift({ desc, cat, amount, id: Date.now() });
            localStorage.setItem('fpro_txs', JSON.stringify(transactions));
            
            document.getElementById('txForm').reset();
            updateUI();
        }

        function clearData() {
            if(confirm("¿Seguro que deseas reiniciar los datos contables?")) {
                transactions = [];
                localStorage.removeItem('fpro_txs');
                updateUI();
            }
        }

        function updateUI() {
            let totalIncome = 0;
            let totalExpense = 0;
            const container = document.getElementById('ledgerContainer');
            container.innerHTML = '';

            transactions.forEach(t => {
                if(t.cat === 'Ingreso') totalIncome += t.amount;
                else totalExpense += t.amount;

                const li = document.createElement('li');
                li.className = 'ledger-item';
                li.innerHTML = `
                    <div>
                        <strong>${t.desc}</strong>
                        <div style="font-size:10px; opacity:0.5;">${t.cat}</div>
                    </div>
                    <span style="color:${t.cat==='Ingreso'?'var(--success)':'var(--danger)'}; font-weight:bold;">
                        ${t.cat==='Ingreso'?'+':'-'}${formatMoney(t.amount)}
                    </span>
                `;
                container.appendChild(li);
            });

            document.getElementById('val-inc').innerText = formatMoney(totalIncome);
            document.getElementById('val-exp').innerText = formatMoney(totalExpense);
            
            const net = totalIncome - totalExpense;
            const netEl = document.getElementById('val-net');
            netEl.innerText = (net < 0 ? '-' : '') + formatMoney(net);
            netEl.style.color = net >= 0 ? 'var(--text-color)' : 'var(--danger)';

            updateBudgetBars();
        }

        function updateBudgetBars() {
            const barContainer = document.getElementById('budgetBarsContainer');
            barContainer.innerHTML = '';
            
            const categoryTotals = {};
            transactions.forEach(t => {
                if(t.cat !== 'Ingreso') {
                    categoryTotals[t.cat] = (categoryTotals[t.cat] || 0) + t.amount;
                }
            });

            Object.keys(limits).forEach(cat => {
                const spent = categoryTotals[cat] || 0;
                const limit = limits[cat];
                const pct = Math.min((spent / limit) * 100, 100);
                
                const group = document.createElement('div');
                group.className = 'budget-bar-group';
                group.innerHTML = `
                    <div class="budget-bar-header">
                        <span>${cat}</span>
                        <span>${formatMoney(spent)} / ${formatMoney(limit)}</span>
                    </div>
                    <div class="budget-bar-track">
                        <div class="budget-bar-fill ${spent>limit?'warning':''}" style="width:${pct}%"></div>
                    </div>
                `;
                barContainer.appendChild(group);
            });
        }

        function updateChart() {
            const ctx = document.getElementById('pieChart').getContext('2d');
            const dataMap = {};
            transactions.forEach(t => {
                if(t.cat !== 'Ingreso') dataMap[t.cat] = (dataMap[t.cat] || 0) + t.amount;
            });

            const labels = Object.keys(dataMap);
            const values = Object.values(dataMap);
            const textChartColor = getComputedStyle(document.documentElement).getPropertyValue('--text-color').trim();

            if(pieChartInstance) pieChartInstance.destroy();
            
            if(labels.length === 0) return;

            pieChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: ['#a855f7', '#ec4899', '#f59e0b', '#10b981', '#3b82f6'],
                        borderWidth: 2,
                        borderColor: getComputedStyle(document.documentElement).getPropertyValue('--card-bg').trim()
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 }, color: textChartColor } } }
                }
            });
        }

        // --- SISTEMA DEL BOT DE IA ---
        function sendChatMessage() {
            const input = document.getElementById('ai-chat-input');
            const chatroom = document.getElementById('chatroomContainer');
            const userText = input.value.trim();
            if(!userText) return;

            chatroom.innerHTML += `<div class="msg user">${userText}</div>`;
            input.value = '';
            chatroom.scrollTop = chatroom.scrollHeight;

            setTimeout(() => {
                let reply = "He analizado los flujos de tus módulos de gasto. Los balances se mantienen alineados con la persistencia en caché.";
                if(userText.includes('50/30/20')) reply = "Análisis: Tu categoría de Necesidades y Antojos está calculada en base a las categorías registradas. Reduce tus gastos en Ocio para optimizar el ratio.";
                if(userText.includes('tope') || userText.includes('presupuesto')) reply = "Alerta: Revisa el módulo de analíticas. Si has excedido las barras en rojo, disminuye los consumos variables de inmediato.";
                
                chatroom.innerHTML += `<div class="msg bot">${reply}</div>`;
                chatroom.scrollTop = chatroom.scrollHeight;
            }, 500);
        }

        // --- FUNCIONES PARA EL MENÚ DE COMANDOS RÁPIDOS ---
        function toggleMenuComandos(event) {
            event.stopPropagation();
            const menu = document.getElementById('menu-comandos');
            menu.style.display = (menu.style.display === 'none' || menu.style.display === '') ? 'block' : 'none';
        }

        function ejecutarComando(texto) {
            const input = document.getElementById('ai-chat-input');
            if (input) {
                input.value = texto;
                document.getElementById('menu-comandos').style.display = 'none';
                sendChatMessage();
            }
        }

        document.addEventListener('click', function(e) {
            const menu = document.getElementById('menu-comandos');
            const btn = document.getElementById('btn-comandos');
            if (menu && menu.style.display === 'block' && e.target !== menu && e.target !== btn && !menu.contains(e.target)) {
                menu.style.display = 'none';
            }
        });

        // --- INICIALIZACIÓN ---
        window.onload = function() {
            const savedTheme = localStorage.getItem('fpro_theme') || 'cyberpunk';
            document.getElementById('themeSelector').value = savedTheme;
            changeTheme(savedTheme);
            
            document.getElementById('chatroomContainer').innerHTML = `<div class="msg bot">${langStrings[currentLang].botWelcome}</div>`;
            applyLanguageStrings();
            updateUI();
        };
    </script>
</body>
</html>
